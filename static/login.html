<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BECBUC 2026 — Ingresar</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f1117; color: #e8eaf0;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.card {
  background: #1a1d27; border: 1px solid #2a2d3a;
  border-radius: 14px; padding: 40px 32px;
  width: 100%; max-width: 340px;
}
h1 { font-size: 1.8rem; font-weight: 900; color: #e05020; text-align: center; margin-bottom: 4px; }
.sub { font-size: .72rem; color: #8892a4; text-align: center; margin-bottom: 28px; text-transform: uppercase; letter-spacing: .06em; }
label { display: block; font-size: .72rem; color: #8892a4; margin-bottom: 5px; margin-top: 16px; text-transform: uppercase; letter-spacing: .06em; }
input {
  width: 100%; background: rgba(255,255,255,.05); border: 1px solid #2a2d3a;
  border-radius: 8px; color: #e8eaf0; font-size: .9rem; padding: 10px 13px; outline: none;
}
input:focus { border-color: #e05020; }
button {
  display: block; width: 100%; margin-top: 24px; padding: 11px;
  background: #e05020; color: #fff; border: none; border-radius: 9px;
  font-size: .9rem; font-weight: 700; cursor: pointer;
}
button:disabled { opacity: .5; cursor: not-allowed; }
.err { margin-top: 14px; color: #ef4444; font-size: .78rem; text-align: center; min-height: 18px; }
</style>
</head>
<body>
<div class="card">
  <h1>BEC BUC</h1>
  <div class="sub">Copa del Mundo 2026</div>

  <a href="/static/becbuc-live.html" style="display:block;margin-bottom:18px;padding:11px 14px;background:rgba(0,166,81,.08);border:1px solid rgba(0,166,81,.3);border-radius:9px;text-decoration:none;text-align:center;">
    <div style="font-size:.95rem;font-weight:800;color:#00a651;">🔴 BECBUC Live</div>
    <div style="font-size:.68rem;color:#8892a4;margin-top:2px;">Accedé al partido en vivo sin loguearte</div>
  </a>

  <label>Usuario</label>
  <input id="u" type="text" autocomplete="username" placeholder="tu usuario"
         onkeydown="if(event.key==='Enter')document.getElementById('p').focus()">

  <label>Contraseña</label>
  <input id="p" type="password" autocomplete="current-password" placeholder="••••••"
         onkeydown="if(event.key==='Enter')login()">

  <button id="btn" onclick="login()">Ingresar</button>
  <div class="err" id="err"></div>
</div>

<script>
async function login() {
  const u   = document.getElementById('u').value.trim();
  const p   = document.getElementById('p').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('btn');

  err.textContent = '';
  if (!u || !p) { err.textContent = 'Completá usuario y contraseña.'; return; }

  btn.disabled = true;
  btn.textContent = 'Ingresando…';

  try {
    const r = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': 'true'
      },
      body: JSON.stringify({ username: u, password: p })
    });
    let data;
    try { data = await r.json(); }
    catch {
      err.textContent = 'Error de conexión (respuesta inválida). Intentá de nuevo.';
      btn.disabled = false; btn.textContent = 'Ingresar'; return;
    }
    if (!r.ok) {
      err.textContent = data.detail || 'Credenciales incorrectas.';
      btn.disabled = false;
      btn.textContent = 'Ingresar';
      return;
    }

    // Guardar tokens en storage (disponibles en la página destino)
    sessionStorage.setItem('bec_token', data.access_token);
    localStorage.setItem('tok_fix', data.access_token);
    if (data.refresh_token) localStorage.setItem('becbuc_refresh', data.refresh_token);

    // Detectar dispositivo: móvil si userAgent indica mobile/tablet O pantalla angosta
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                     || window.innerWidth < 768;
    const dest = isMobile ? '/static/BECBUC-movil.html' : '/static/BECBUC-portal.html';
    // Pasar token por URL como respaldo por si sessionStorage no persiste entre páginas
    window.location.href = dest + '?token=' + encodeURIComponent(data.access_token);

  } catch {
    err.textContent = 'Error de conexión con el servidor.';
    btn.disabled = false;
    btn.textContent = 'Ingresar';
  }
}

// Foco automático en el campo usuario
document.getElementById('u').focus();
</script>
</body>
</html>
