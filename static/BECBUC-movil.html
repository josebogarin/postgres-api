let _transpSelM=null;
function _changeTranspApostadorM(v){ _transpSelM=v?+v:null; loadTransparencia(_transpSelM); }
async function _exportTransparenciaM(btn){
  // Validar completitud: todos los grupos + bracket 32avos con equipos
  const gruposOk = _grupos.length > 0 && _grupos.every(g =>
    g.partidos.every(p => {
      const sl=_slip[p.id]||{}, ap=_misApuestas[p.id]||{};
      return (sl.pred_local??ap.pred_local)!=null && (sl.pred_visitante??ap.pred_visitante)!=null;
    })
  );
  const koData = (_bracket && _bracket.ko_bracket) || [];
  const ko32 = koData.find(f=>(f.partidos||[]).length>=16);
  const bracketOk = !!ko32 && !ko32.partidos.some(p=>!p.local||p.local==='TBD');
  if (!gruposOk || !bracketOk) {
    const motivo = !gruposOk
      ? 'Completá todos los pronósticos de la fase de grupos.'
      : 'El bracket de 32avos debe tener equipos definidos (completá y propagá los grupos).';
    alert('⚠️ Pronósticos incompletos\n\n' + motivo);
    return;
  }
  const old=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent='⏳';}
  try{
    const h={}; if(token) h['Authorization']='Bearer '+token;
    const r=await fetch('/api/v1/bets/transparencia/'+_torneoId+'/export',{headers:h});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const blob=await r.blob();
    const cd=r.headers.get('Content-Disposition')||'';
    const m=cd.match(/filename="?([^"]+)"?/);
    const fname=m?m[1]:('transparencia_'+_torneoId+'.xlsx');
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=fname;document.body.appendChild(a);a.click();
    a.remove();URL.revokeObjectURL(url);
  }catch(e){alert('No se pudo exportar el Excel: '+e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent=old;}}
}
async function loadTransparencia(selUid){
  const sel=(selUid!=null)?selUid:_transpSelM;
  const el=document.getElementById('page-fases');
  el.innerHTML='<div class="loader"><span class="spin">◌</span> Cargando transparencia…</div>';
  let d;
  const q=sel?('?apostador_id='+sel):'';
  try{d=await api('/api/v1/bets/transparencia/'+_torneoId+q);}catch(e){el.innerHTML=empty('⚠️','Error',esc(e.message));return;}
  if(!d){el.innerHTML=empty('⚠️','Sin datos','No se pudo cargar la transparencia.');return;}
  // Si el usuario actual no es apostador (p.ej. admin), el backend devuelve
  // apostador_sel fuera de la lista -> selector y ficha se desincronizan.
  // Caer al primer apostador real para que ambos coincidan.
  const _apsM=(d.ranking&&d.ranking.apostadores)||[];
  if(sel==null&&_apsM.length&&!_apsM.some(a=>a.apostador_id===d.apostador_sel)){
    return loadTransparencia(_apsM[0].apostador_id);
  }
  const medals=['🥇','🥈','🥉'];
  const score=(gl,gv,pl,pv)=>(gl==null?'—':`${gl}-${gv}`)+((pl!=null&&pv!=null)?` (p ${pl}-${pv})`:'');
  const itc=p=>p>0?`<span class="tp-chip ok">+${p}</span>`:'<span class="tp-dash">—</span>';
  let h='<div class="ptitle"><div>Transparencia<small>Resultados reales · tus puntajes · ranking por fase</small></div></div>';

  /* 1) Ranking acumulado por fase */
  const R=d.ranking||{fases:[],labels:{},apostadores:[]};
  h+='<div class="tp-sec">🏆 Ranking acumulado por fase</div>';
  if(!R.apostadores.length){
    h+='<div class="tp-empty">Todavía no hay puntajes calculados.</div>';
  }else{
    R.apostadores.forEach((a,i)=>{
      h+=`<div class="tp-card ${a.es_actual?'me':''}">
        <div class="tp-rk-h"><span class="tp-pos">${medals[i]||(i+1)}</span>
          <span class="tp-nm">${esc(a.nombre)}</span>
          <span class="tp-tot">${a.total}</span></div>
        <div class="tp-faserow">`;
      R.fases.forEach(f=>{const c=a.por_fase[f]||{pts:0,acumulado:0};
        h+=`<span class="tp-fchip"><b>${esc(R.labels[f]||f)}</b> ${c.pts}<i>Σ${c.acumulado}</i></span>`;});
      h+='</div></div>';
    });
  }

  /* 2) Resultados y clasificados reales */
  h+='<div class="tp-sec">✅ Resultados y clasificados reales</div>';
  const _gruposJugadosM=(d.grupos||[]).some(g=>(g.equipos||[]).some(e=>(e.pj||0)>0));
  h+=`<div class="tp-card"><div class="tp-gh">Fase de grupos</div>${_gruposJugadosM?'':'<div class="tp-mut">Aún no se jugó.</div>'}</div>`;
  if(d.grupos&&d.grupos.length&&_gruposJugadosM){
    d.grupos.forEach(g=>{
      h+=`<div class="tp-card"><div class="tp-gh">Grupo ${esc(g.grupo)}</div>`;
      g.equipos.forEach(e=>{const cls=e.clasificado?'cls':'';
        const tag=e.clasificado?' ✓':'';
        h+=`<div class="tp-grow ${cls}"><span>${e.pos}. ${esc(e.nombre)}${tag}</span><span>${e.pts} pts</span></div>`;});
      h+='</div>';
    });
  }
  (d.ko||[]).forEach(f=>{
    const jugada=f.partidos.some(p=>p.finalizado);
    h+=`<div class="tp-card"><div class="tp-gh">${esc(f.nombre)}</div>`;
    if(!jugada){h+='<div class="tp-mut">Aún no se jugó.</div></div>';return;}
    f.partidos.forEach(p=>{
      h+=`<div class="tp-kom"><div class="tp-kol"><span>${esc(p.local)} vs ${esc(p.visitante)}</span><b>${score(p.gl,p.gv,p.pen_l,p.pen_v)}</b></div>
        ${p.ganador?`<div class="tp-win">→ ${esc(p.ganador)} avanza</div>`:''}</div>`;});
    h+='</div>';
  });

  /* 3) Apuestas y puntajes por fase (propias o de otro apostador) */
  const esPropioM=d.apostador_sel===d.apostador_propio;
  let selM='';
  if(R.apostadores&&R.apostadores.length){
    selM=`<select class="tp-sel" onchange="_changeTranspApostadorM(this.value)">`;
    R.apostadores.forEach(a=>{
      const s=a.apostador_id===d.apostador_sel?' selected':'';
      const yo=a.apostador_id===d.apostador_propio?' (yo)':'';
      selM+=`<option value="${a.apostador_id}"${s}>${esc(a.nombre)}${yo}</option>`;});
    selM+=`</select>`;
  }
  h+=`<div class="tp-sec">📋 Apuestas por fase ${esPropioM?'(tuyas)':'(de otro)'}</div>`;
  h+=`<div class="tp-bigname"><span class="tp-bn-lbl">Apostador</span><span class="tp-bn-nm">${esc(d.apostador_sel_nombre||'')}</span>${esPropioM?'<span class="tp-bn-yo">(tú)</span>':''}</div>`;
  if(selM) h+=`<div class="tp-selwrap"><span>Ver:</span>${selM}<button class="tp-xls" onclick="_exportTransparenciaM(this)">⬇ Excel</button></div>`;
  if(!d.mias||!d.mias.length){
    h+='<div class="tp-empty">Sin puntajes calculados todavía para este apostador.</div>';
  }else{
    d.mias.forEach(m=>{
      h+=`<div class="tp-card"><div class="tp-mh"><span>${esc(m.nombre)}</span><span class="tp-chip ok">Subtotal ${m.subtotal}</span></div>`;
      m.partidos.forEach(p=>{
        const lf=flag(p.local_logo,p.local_nombre,'sm'), vf=flag(p.visit_logo,p.visit_nombre,'sm');
        h+=`<div class="tp-bet">
          <div class="tp-bet-h">
            <span class="tp-mteams">
              <span class="tp-mtl">${lf}<span>${esc(p.local_nombre||'?')}</span></span>
              <span class="tp-mtl">${vf}<span>${esc(p.visit_nombre||'?')}</span></span>
              <span class="tp-mx">x${p.multiplicador}</span>
            </span>
            <span class="tp-sc">${p.pred_local}-${p.pred_visitante} <i>vs</i> <b>${p.real_local}-${p.real_visitante}</b></span>
            <span class="tp-chip ${p.pts_total>0?'ok':'gray'}">${p.pts_total}</span></div>
          <div class="tp-bet-items">⚽${itc(p.pts_marcador)} ⏱${itc(p.pts_minuto)} 🟨${itc(p.pts_amarillas)} <span class="var-badge">VAR</span>${itc(p.pts_var)}</div>
        </div>`;});
      h+='</div>';
    });
  }
  el.innerHTML=h;
}

async function _loadFasesBloqueoM(){
  const cont=document.getElementById('amFasesBloqueo'); if(!cont) return;
  try{
    const fases=await api('/api/v1/bets/fases-bloqueo/'+(_torneoId||1));
    const EXCLUIR_TIPO=new Set(['terceros','ranking']);
    const EXCLUIR_NOMBRE=/tercero|mejores|ranking/i;
    const visibles=fases.filter(f=>!EXCLUIR_TIPO.has(f.tipo)&&!EXCLUIR_NOMBRE.test(f.nombre));
    if(!visibles.length){cont.innerHTML='<span style="color:var(--muted);font-size:.75rem">Sin fases</span>';return;}
    const grupos=visibles.filter(f=>f.tipo==='grupo');
    const otras=visibles.filter(f=>f.tipo!=='grupo');
    const rows=[];
    if(grupos.length){
      const bl=grupos.some(g=>g.bloqueada);
      const totalG=grupos.reduce((s,g)=>s+(g.total||0),0);
      const finalG=grupos.reduce((s,g)=>s+(g.finalizados||0),0);
      rows.push(`<div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-radius:8px;padding:8px 12px">
        <div>
          <div style="font-weight:700;font-size:.8rem">Fase de Grupos (A–L)</div>
          <div style="font-size:.65rem;color:var(--muted2)">${finalG}/${totalG} partidos finalizados</div>
        </div>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <span style="font-size:.75rem;color:${bl?'var(--orange)':'var(--green)'}"><b>${bl?'🔒':'🔓'}</b></span>
          <input type="checkbox" ${bl?'checked':''} onchange="toggleFaseBloqueoGruposM(this.checked)" style="cursor:pointer;width:18px;height:18px">
        </label>
      </div>`);
    }
    for(const f of otras){
      rows.push(`<div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-radius:8px;padding:8px 12px">
        <div>
          <div style="font-weight:700;font-size:.8rem">${esc(f.nombre)}</div>
          <div style="font-size:.65rem;color:var(--muted2)">${f.finalizados||0}/${f.total||0} partidos finalizados</div>
        </div>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <span style="font-size:.75rem;color:${f.bloqueada?'var(--orange)':'var(--green)'}"><b>${f.bloqueada?'🔒':'🔓'}</b></span>
          <input type="checkbox" ${f.bloqueada?'checked':''} onchange="toggleFaseBloqueoM(${f.id},this.checked)" style="cursor:pointer;width:18px;height:18px">
        </label>
      </div>`);
    }
    cont.innerHTML=rows.join('');
  }catch(e){cont.innerHTML=`<span style="color:var(--red);font-size:.75rem">Error: ${esc(e.message)}</span>`;}
}

/* ── Tab Partidos (móvil) ─────────────────────────────────────────────────── */
function _mIsLive(p){const s=p.estado||'';return s!=='finalizado'&&s!=='programado'&&p.goles_local!=null;}
function _mIsHoy(p){if(!p.fecha)return false;return new Date(p.fecha).toDateString()===new Date().toDateString();}

async function _renderPronosPartidosM(el){
  if(_mPartidosTimer){clearTimeout(_mPartidosTimer);_mPartidosTimer=null;}
  let data;
  try{data=await api(`/api/v1/bets/mis-partidos/${_torneoId}`);}
  catch(e){el.innerHTML=`<div style="color:var(--muted);text-align:center;padding:20px;font-size:.8rem;">Error: ${e.message}</div>`;return;}
  if(!data||!data.length){el.innerHTML=`<div style="color:var(--muted);text-align:center;padding:20px;font-size:.8rem;">Sin partidos disponibles</div>`;return;}

  const ns={};let changed=false;
  data.forEach(p=>{const k=`${p.partido_id}`,v=`${p.goles_local??'-'}-${p.goles_visitante??'-'}`;
    if(_mPartidosPrevScores[k]!==undefined&&_mPartidosPrevScores[k]!==v)changed=true;ns[k]=v;});
  _mPartidosPrevScores=ns;
  if(changed&&_isAdmin){
    try{await api(`/api/v1/bets/calcular-puntajes/${_torneoId}`,{method:'POST'});
        data=await api(`/api/v1/bets/mis-partidos/${_torneoId}`).catch(()=>data);}catch{}
  }

  const live=data.filter(p=>_mIsLive(p));
  const rest=data.filter(p=>!_mIsLive(p));
  rest.sort((a,b)=>new Date(a.fecha||0)-new Date(b.fecha||0));

  const badge=changed?`<span style="font-size:.65rem;padding:2px 7px;background:rgba(34,197,94,.15);color:var(--green);border-radius:8px;border:1px solid rgba(34,197,94,.3);">${_isAdmin?'🔄 Recalc':'🔄 Actualiz'}</span>`:'';
  let h=`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
    <span style="font-size:.75rem;color:var(--muted);">${data.length} partidos${live.length?` &bull; <b style="color:var(--amber)">${live.length} en vivo</b>`:''}</span>${badge}</div>`;

  if(live.length){
    h+=`<div style="margin-bottom:12px;border:1px solid rgba(224,80,32,.3);border-radius:8px;overflow:hidden;">
      <div style="padding:4px 10px;font-size:.68rem;font-weight:800;color:var(--amber);background:rgba(224,80,32,.1);">🔴 EN VIVO</div>`;
    live.forEach(p=>{h+=_mPRow(p);});h+=`</div>`;
  }

  let lastDay=null;
  rest.forEach(p=>{
    const dk=p.fecha?new Date(p.fecha).toDateString():'x';
    if(dk!==lastDay){
      if(lastDay!==null) h+=`</div>`;
      let dl='SIN FECHA';
      if(p.fecha){const d=new Date(p.fecha);
        const it=d.toDateString()===new Date().toDateString();
        const tom=d.toDateString()===new Date(Date.now()+86400000).toDateString();
        dl=it?'HOY':tom?'MAÑANA':d.toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'short'}).toUpperCase();}
      const ith=p.fecha&&new Date(p.fecha).toDateString()===new Date().toDateString();
      h+=`<div style="margin-bottom:8px;border:1px solid ${ith?'rgba(224,80,32,.2)':'var(--line)'};border-radius:8px;overflow:hidden;">
        <div style="padding:4px 10px;font-size:.68rem;font-weight:800;color:${ith?'var(--amber)':'var(--muted)'};background:${ith?'rgba(224,80,32,.08)':'var(--surface2,#f4f4f4)'};">${dl}</div>`;
      lastDay=dk;
    }
    h+=_mPRow(p);
  });
  if(lastDay!==null) h+=`</div>`;

  h+=`<div style="margin-top:6px;font-size:.62rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;">
    <span style="color:var(--green)">&#9679;</span> Exacto &nbsp;
    <span style="color:var(--amber)">&#9679;</span> Result OK &nbsp;
    <span style="color:var(--red)">&#9679;</span> Fallo &nbsp;
    <span style="color:var(--muted2,#aaa)">&#9679;</span> Pendiente</div>`;

  el.innerHTML=h;

  const hasActive=data.some(p=>_mIsLive(p)||_mIsHoy(p));
  if(hasActive&&_pronosTab==='partidos')
    _mPartidosTimer=setTimeout(()=>_renderPronosPartidosM(document.getElementById('pron-content')),30000);
}

function _mPRow(p){
  const live=_mIsLive(p),fin=p.estado==='finalizado';
  const gl=p.goles_local??null,gv=p.goles_visitante??null;
  const pl=p.pred_local??null,pv=p.pred_visitante??null;
  const tot=p.pts_total!=null?p.pts_total:((p.puntos_base||0)+(p.puntos_bonus||0));
  const hasPred=pl!==null&&pv!==null,hasReal=gl!==null&&gv!==null;
  let pc='var(--muted2,#aaa)',pi='';
  if(hasReal&&hasPred){
    const ex=pl===gl&&pv===gv,ok=!ex&&((pl>pv&&gl>gv)||(pl===pv&&gl===gv)||(pl<pv&&gl<gv));
    if(ex){pc='var(--green)';pi='★';}else if(ok){pc='var(--amber)';pi='✓';}else{pc='var(--red)';pi='✗';}
  }
  const lLg=p.local_logo?`<img src="${p.local_logo}" style="width:16px;height:11px;object-fit:cover;border-radius:2px;flex-shrink:0;" onerror="this.style.display='none'">`:'' ;
  const vLg=p.visit_logo?`<img src="${p.visit_logo}" style="width:16px;height:11px;object-fit:cover;border-radius:2px;flex-shrink:0;" onerror="this.style.display='none'">`:'' ;
  const dot=live?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-right:2px;vertical-align:middle;animation:blink 1s step-start infinite;"></span>`:'';
  let minL;
  if(live) minL=`${dot}<span style="color:var(--amber);font-weight:700;font-size:.7rem;">${p.minuto_actual??''}&#x2032;</span>`;
  else if(fin) minL=`<span style="color:var(--muted);font-size:.65rem;">Final</span>`;
  else if(p.fecha){const d=new Date(p.fecha);minL=`<span style="color:var(--muted2,#aaa);font-size:.63rem;">${d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})} ${d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>`;}
  else minL=`<span style="color:var(--muted2)">&#8212;</span>`;
  const scoreR=hasReal?`<span style="font-weight:800;font-size:.92rem;">${gl}&#x2013;${gv}</span>`:`<span style="color:var(--muted2);font-size:.75rem;">&#xB7;&#xB7;&#xB7;</span>`;
  const predB=hasPred?`<span style="font-size:.62rem;font-weight:700;color:${pc};padding:1px 5px;background:${pc.replace(')',',0.15)')};border-radius:6px;white-space:nowrap;">${pi} ${pl}&#x2013;${pv}</span>`:`<span style="font-size:.6rem;color:var(--muted);font-style:italic;">sin pred</span>`;
  const ptsB=tot>0?`<span style="font-size:.7rem;font-weight:800;color:var(--green);background:rgba(34,197,94,.15);padding:2px 7px;border-radius:8px;">${tot}</span>`:(hasPred&&hasReal?`<span style="font-size:.7rem;color:var(--muted);padding:2px 6px;">0</span>`:'');
  const mchips=[];
  if(hasReal||fin){
    if(p.amarillas!=null) mchips.push(`<span style="font-size:.6rem;padding:1px 5px;background:rgba(234,179,8,.15);border-radius:8px;color:#b45309;font-weight:700;">🟨 ${p.amarillas}</span>`);
    if(p.rojas>0) mchips.push(`<span style="font-size:.6rem;padding:1px 5px;background:rgba(220,38,38,.12);border-radius:8px;color:#dc2626;font-weight:700;">🟥 ${p.rojas}</span>`);
    if(p.minuto_primer_gol!=null) mchips.push(`<span style="font-size:.6rem;padding:1px 5px;background:rgba(34,197,94,.12);border-radius:8px;color:var(--green,#16a34a);font-weight:700;">⚽ ${p.minuto_primer_gol}'</span>`);
  }
  const chipsRow=mchips.length?`<div style="grid-column:1/-1;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;padding:2px 0 0;">${mchips.join('')}</div>`:'';
  return `<div style="${live?'background:rgba(224,80,32,.04);':''}display:grid;grid-template-columns:64px 1fr auto 1fr 38px;align-items:center;gap:4px;padding:6px 10px;border-bottom:1px solid var(--line);">
    <div style="font-size:.65rem;">${minL}</div>
    <div style="display:flex;align-items:center;gap:4px;justify-content:flex-end;min-width:0;overflow:hidden;">${lLg}<span style="font-size:.72rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.local_nombre||''}</span></div>
    <div style="text-align:center;min-width:68px;"><div>${scoreR}</div><div style="margin-top:1px;">${predB}</div></div>
    <div style="display:flex;align-items:center;gap:4px;min-width:0;overflow:hidden;"><span style="font-size:.72rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.visit_nombre||''}</span>${vLg}</div>
    <div style="text-align:right;">${ptsB}</div>
    ${chipsRow}
  </div>`;
}

function fpSelectM(id,label){

  document.getElementById('fpLabelM').textContent=label;

  ['fpGLM','fpGVM','fpPLM','fpPVM'].forEach(x=>{document.getElementById(x).value='';});

async function confirmarFpM(){
  const pid=parseInt(document.getElementById('fpPidM').value);
  const gl=parseInt(document.getElementById('fpGLM').value);
  const gv=parseInt(document.getElementById('fpGVM').value);
  const pl=document.getElementById('fpPLM').value;
  const pv=document.getElementById('fpPVM').value;
  const msg=document.getElementById('fpMsgM');
  const btn=document.getElementById('fpBtnM');
  if(!pid||isNaN(gl)||isNaN(gv)){msg.innerHTML='<span style="color:var(--red)">Completá ID y goles.</span>';return;}
  if(!confirm(`¿Finalizar partido #${pid} con ${gl}–${gv}?\nSe guardarán los resultados y recalcularán standings, bracket y puntajes.`)) return;
  btn.disabled=true; btn.textContent='Guardando…';
  msg.innerHTML='';
  try{
    let qs=`?goles_local=${gl}&goles_visitante=${gv}`;
    if(pl!==''&&!isNaN(parseInt(pl))) qs+=`&penales_local=${parseInt(pl)}`;
    if(pv!==''&&!isNaN(parseInt(pv))) qs+=`&penales_visitante=${parseInt(pv)}`;
    const r=await api(`/api/v1/bets/finalizar-partido/${pid}${qs}`,{method:'POST'});
    const steps=[`✅ ${r.partido}`];
    if(r.standings_ok) steps.push('📊 standings OK');
    if(r.bracket_ok) steps.push('🔀 bracket OK');
    if(r.puntajes_ok) steps.push(`🏆 puntajes OK (${r.puntajes_procesados??0})`);
    if(r.standings_error) steps.push(`⚠️ ${r.standings_error}`);
    if(r.bracket_error) steps.push(`⚠️ ${r.bracket_error}`);
    if(r.puntajes_error) steps.push(`⚠️ ${r.puntajes_error}`);
    msg.innerHTML=`<span style="color:var(--green);font-size:.73rem">${steps.join(' → ')}</span>`;
    document.getElementById('amFpMsg').innerHTML=msg.innerHTML;
  }catch(e){
    msg.innerHTML=`<span style="color:var(--red)">✗ ${e.message}</span>`;
  }finally{btn.disabled=false; btn.textContent='⚡ Finalizar y recalcular';}
}
