<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fixture — Lambda</title>
<style>
/* ── Variables ─────────────────────────────────────────────────── */
:root {
  --bg:#0f1117; --bg2:#181c26; --bg3:#1e2330; --bg4:#252b3b;
  --border:#2e3548; --accent:#E05020; --accent2:#FF6B35;
  --text:#e8ecf4; --muted:#7a8499; --success:#22c55e; --warn:#f59e0b; --danger:#ef4444;
  --radius:8px; --font:'Segoe UI',system-ui,sans-serif;
  --sidebar-w:260px; --header-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* ── Header ── */
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:100;
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;display:flex;align-items:center;gap:12px}
.logo{font-size:20px;font-weight:800;color:var(--accent)}
.header h1{font-size:15px;font-weight:600;flex:1}
.ham-btn{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px}
.sync-btn{background:none;border:1px solid var(--border);color:var(--muted);
  padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
.sync-btn:hover{border-color:var(--accent);color:var(--text)}

/* ── Layout ── */
.layout{display:flex;margin-top:var(--header-h);height:calc(100vh - var(--header-h))}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;transition:transform .25s}
.sidebar-title{padding:14px 16px 8px;font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em}
.comp-card{margin:3px 8px;border-radius:var(--radius);border:1px solid var(--border);
  cursor:pointer;transition:all .15s;overflow:hidden}
.comp-card:hover{border-color:var(--accent);background:var(--bg3)}
.comp-card.active{border-color:var(--accent);background:var(--bg3)}
.comp-card-top{display:flex;align-items:center;gap:10px;padding:10px 12px}
.comp-emoji{font-size:22px;line-height:1}
.comp-info{flex:1;min-width:0}
.comp-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-season{font-size:11px;color:var(--muted);margin-top:2px}
.comp-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap}
.badge-live{background:#7c2d12;color:#fca5a5}
.badge-done{background:#1c1917;color:#a8a29e}
.badge-loaded{background:#14532d;color:#86efac;margin-left:4px}
.comp-actions{padding:0 12px 12px;display:none}
.comp-card.active .comp-actions{display:block}

/* ── Main ── */
.main{flex:1;overflow-y:auto;padding:18px 20px;min-width:0}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border:none;
  border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85} .btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--bg4);color:var(--text);border:1px solid var(--border)}
.btn-block{width:100%;justify-content:center}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:18px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;
  color:var(--muted);transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Grupos ── */
.grupos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.grupo-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.grupo-header{padding:8px 12px;background:var(--bg3);font-size:13px;font-weight:600;
  border-bottom:1px solid var(--border)}
.standings{width:100%;border-collapse:collapse;font-size:12px}
.standings th{padding:4px 7px;text-align:center;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border)}
.standings th:first-child{text-align:left}
.standings td{padding:4px 7px;text-align:center;border-bottom:1px solid var(--border)}
.standings td:first-child{text-align:left}
.standings tr:last-child td{border-bottom:none}
.standings tr.clasifica td:first-child{border-left:3px solid var(--success)}
.team-cell{display:flex;align-items:center;gap:5px}
.team-cell img{width:16px;height:16px;object-fit:contain;flex-shrink:0}

/* ── Partidos (grupos) ── */
.partidos-list{padding:6px 8px}
.partido-row{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;
  transition:background .12s;margin-bottom:2px;border:1px solid transparent}
.partido-row:hover{background:var(--bg4)}
.partido-row.jugado{cursor:zoom-in}
.partido-row.jugado:hover{border-color:var(--accent)}
.eq-cell{display:flex;align-items:center;gap:5px;flex:1;min-width:0}
.eq-cell.right{flex-direction:row-reverse}
.eq-cell img{width:18px;height:18px;object-fit:contain;flex-shrink:0}
.eq-cell span{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res-box{display:flex;flex-direction:column;align-items:center;min-width:52px}
.res-score{display:flex;align-items:center;gap:3px;background:var(--bg4);border:1px solid var(--border);
  border-radius:5px;padding:3px 8px;font-size:13px;font-weight:700;white-space:nowrap}
.res-score .sep{color:var(--muted);font-weight:400;font-size:11px}
.pen-note{font-size:9px;color:var(--warn);margin-top:1px}
.p-fecha{font-size:10px;color:var(--muted);text-align:center;min-width:52px;line-height:1.4}

/* ── Bracket ── */
.bracket{overflow-x:auto;padding-bottom:10px}
.bracket-cols{display:flex;gap:0}
.bracket-col{min-width:210px;display:flex;flex-direction:column}
.bracket-col-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;padding:5px 8px;text-align:center;border-bottom:1px solid var(--border)}
.bracket-matches{display:flex;flex-direction:column;gap:6px;padding:8px 5px}
.bm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;transition:border-color .15s}
.bm:hover{border-color:var(--accent)}
.bm-leg{font-size:9px;color:var(--muted);padding:3px 8px;background:var(--bg3);
  border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
.bm-row{display:flex;align-items:center;gap:7px;padding:7px 9px;font-size:12px;
  border-bottom:1px solid var(--border)}
.bm-row:last-child{border-bottom:none}
.bm-row.winner{background:rgba(34,197,94,.07)}
.bm-row img{width:18px;height:18px;object-fit:contain;flex-shrink:0}
.bm-row .bm-score{margin-left:auto;font-weight:700;font-size:13px;white-space:nowrap}
.bm-row .bm-pen{font-size:9px;color:var(--warn);margin-left:3px}
.bm-date{font-size:10px;color:var(--muted);padding:3px 9px;background:var(--bg3)}

/* ═══════════════════════════════════════════════════════════
   CALENDARIO
═══════════════════════════════════════════════════════════ */
.cal-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.cal-view-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.cal-view-toggle button{padding:6px 14px;background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.cal-view-toggle button.active{background:var(--accent);color:#fff}
.cal-month-nav{display:flex;align-items:center;gap:6px}
.cal-month-nav button{background:var(--bg3);border:1px solid var(--border);color:var(--text);
  width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center}
.cal-month-nav button:hover{border-color:var(--accent)}
.cal-month-label{font-size:14px;font-weight:700;min-width:150px;text-align:center}
.cal-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%;margin-top:6px}
.cal-filter-label{font-size:11px;color:var(--muted);white-space:nowrap}
.phase-pills{display:flex;flex-wrap:wrap;gap:4px}
.phase-pill{padding:3px 9px;border-radius:20px;border:1px solid var(--border);
  font-size:11px;cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap}
.phase-pill.on{background:var(--accent);border-color:var(--accent);color:#fff}
.phase-pill.off{color:var(--muted)}
.team-select{padding:6px 10px;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:13px;max-width:200px}
.team-select:focus{outline:none;border-color:var(--accent)}

/* ── Calendario vista MES ── */
.cal-grid{display:flex;flex-direction:column;gap:2px}
.cal-grid-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-grid-header span{text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding:4px 0}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{min-height:72px;background:var(--bg2);border:1px solid var(--border);
  border-radius:6px;padding:4px;cursor:pointer;transition:border-color .15s;overflow:hidden}
.cal-cell:hover{border-color:var(--accent)}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default}
.cal-cell.today{border-color:var(--accent)}
.cal-cell.selected{border-color:var(--accent);background:var(--bg3)}
.cal-cell-num{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}
.cal-cell.today .cal-cell-num{color:var(--accent)}
.cal-cell-match{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  padding:1px 3px;border-radius:3px;margin-bottom:1px;background:var(--bg4)}
.cal-cell-match.played{background:rgba(224,80,32,.18);color:var(--accent2)}
.cal-cell-match.live{background:rgba(239,68,68,.2);color:#fca5a5}
.cal-cell-more{font-size:9px;color:var(--muted);padding-left:3px}

/* ── Calendario vista DÍA / lista ── */
.cal-day-header{display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--border);margin-bottom:10px}
.cal-day-header .dh-fecha{font-size:15px;font-weight:700}
.cal-day-header .dh-count{font-size:12px;color:var(--muted)}
.today-pill{background:var(--accent);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px}
.cal-match{display:grid;align-items:center;gap:8px;padding:9px 12px;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:6px;transition:border-color .15s;
  grid-template-columns: auto 1fr auto 1fr auto}
.cal-match:hover{border-color:var(--border)}
.cal-match.jugado{cursor:zoom-in}
.cal-match.jugado:hover{border-color:var(--accent)}
.cal-match.live-match{border-color:var(--danger)}
.cal-fase-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;
  white-space:nowrap;text-align:center;grid-column:1/6;justify-self:start;margin-bottom:2px}
.cal-team{display:flex;align-items:center;gap:7px;min-width:0}
.cal-team.right{flex-direction:row-reverse;text-align:right}
.cal-team img,.cal-team .flag{width:26px;height:26px;object-fit:contain;flex-shrink:0;border-radius:2px}
.cal-team .flag{font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center}
.cal-team .tname{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-center{display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:62px}
.cal-score-big{display:flex;align-items:center;gap:4px;font-size:18px;font-weight:800}
.cal-score-big .sep{font-size:13px;color:var(--muted);font-weight:400}
.cal-score-big.live-score{color:var(--danger)}
.cal-hora{font-size:12px;color:var(--muted);font-weight:500}
.cal-sub{font-size:10px;color:var(--warn);margin-top:1px}
.cal-no-day{padding:40px;text-align:center;color:var(--muted);font-size:13px}

/* ── Modal estadísticas ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  width:100%;max-width:760px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column}
.modal-header{padding:13px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px}
.modal-header h2{font-size:14px;font-weight:600;flex:1}
.btn-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.btn-close:hover{color:var(--text)}
.modal-body{overflow-y:auto;padding:18px;flex:1}
.scoreboard{text-align:center;margin-bottom:20px}
.sb-teams{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.sb-team{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:100px;max-width:140px}
.sb-team img{width:48px;height:48px;object-fit:contain}
.sb-name{font-size:13px;font-weight:600;text-align:center}
.sb-score{font-size:44px;font-weight:800;line-height:1}
.sb-sep{font-size:24px;color:var(--muted)}
.sb-sub{font-size:11px;color:var(--muted);margin-top:5px}
.sb-meta{margin-top:8px;font-size:11px;color:var(--muted)}
.stats-section{margin-bottom:18px}
.stats-section h3,.eventos-section h3{font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.stats-header{display:grid;grid-template-columns:1fr 1fr 1fr;font-size:11px;color:var(--muted);
  margin-bottom:8px;padding:0 4px}
.stats-header .shn{font-weight:600;color:var(--text)}
.stats-header .shn.right{text-align:right}
.stat-row{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;margin-bottom:8px}
.stat-val{font-size:12px;font-weight:600}
.stat-val.right{text-align:right}
.stat-lbl{font-size:11px;color:var(--muted);text-align:center;white-space:nowrap}
.bar-wrap{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:2px}
.bar-l .bar{float:right;height:100%;background:var(--accent);border-radius:2px}
.bar-r .bar{height:100%;background:#3b82f6;border-radius:2px}
.ev-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.ev-item:last-child{border-bottom:none}
.ev-min{font-size:11px;color:var(--muted);width:32px;text-align:right;flex-shrink:0}
.ev-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.ev-info{flex:1}
.ev-eq{font-size:10px;color:var(--muted)}

/* ── Overlay sidebar móvil ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50}

/* ── Loader / Empty ── */
.loader{display:flex;align-items:center;justify-content:center;padding:60px;
  color:var(--muted);gap:10px;flex-direction:column;font-size:14px}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .big{font-size:48px;margin-bottom:14px}

/* ══════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════ */
@media(max-width:1024px){
  :root{--sidebar-w:230px}
  .grupos-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
}
@media(max-width:768px){
  :root{--sidebar-w:260px}
  .ham-btn{display:flex}
  .sidebar{position:fixed;left:0;top:var(--header-h);bottom:0;z-index:60;
    transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.visible{display:block}
  .main{padding:12px}
  .grupos-grid{grid-template-columns:1fr}
  .cal-match{grid-template-columns:1fr auto 1fr;grid-template-rows:auto auto}
  .cal-fase-tag{grid-column:1/4}
  .cal-team.right{flex-direction:row}
  .bracket-col{min-width:170px}
  .tabs{margin-bottom:12px}
  .cal-toolbar{gap:6px}
  .cal-month-label{min-width:120px;font-size:13px}
  .cal-cell{min-height:56px}
  .cal-cell-match{display:none}
  .cal-cell-more{display:block!important}
  .modal{max-height:96vh}
  .sb-score{font-size:36px}
}
@media(max-width:480px){
  .header h1{display:none}
  .cal-grid-header span{font-size:10px}
  .cal-cell{min-height:44px;padding:3px}
  .cal-cell-num{font-size:10px}
  .cal-score-big{font-size:16px}
  .cal-team .tname{font-size:12px}
  .standings{font-size:11px}
  .standings th,.standings td{padding:3px 5px}
}
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="logo">λ</div>
  <span style="font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;flex-shrink:0;">Resultados</span>
  <select id="torneoSelect" onchange="selectTorneo(parseInt(this.value))"
    style="flex:1;min-width:0;max-width:320px;background:var(--bg3);border:1px solid var(--border);
           color:var(--text);border-radius:6px;padding:5px 8px;font-size:13px;cursor:pointer;outline:none;">
    <option value="">— Cargando —</option>
  </select>

</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()" style="display:none"></div>

<div class="layout">
<!-- Sidebar oculto — competiciones se gestionan desde el portal -->
<aside class="sidebar" id="sidebar" style="display:none">
  <div class="sidebar-title">Competiciones</div>
  <div id="compList"></div>
</aside>

<!-- ── Main ── -->
<main class="main" id="mainArea" style="width:100%">
  <div class="empty"><div class="big">⚽</div>Cargando…</div>
</main>
</div>

<!-- ── Modal Estadísticas ── -->
<div class="modal-overlay" id="statsModal" style="display:none" onclick="closeStats(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="statsTitle">Estadísticas</h2>
      <button class="btn-close" onclick="closeStatsModal()">✕</button>
    </div>
    <div class="modal-body" id="statsBody"></div>
  </div>
</div>

<script>
const BASE='';
let _token=null, _activas=[], _torneoActivo=null;
let _tabKeys=[], _allPartidos=[], _allFases=[];

/* ── Flags ─────────────────────────────────────────────────────────────────── */
const FLAG_MAP={
  'Argentina':'🇦🇷','Brasil':'🇧🇷','Brazil':'🇧🇷','Uruguay':'🇺🇾','Colombia':'🇨🇴',
  'Peru':'🇵🇪','Perú':'🇵🇪','Chile':'🇨🇱','Ecuador':'🇪🇨','Paraguay':'🇵🇾',
  'Bolivia':'🇧🇴','Venezuela':'🇻🇪','France':'🇫🇷','Francia':'🇫🇷',
  'Spain':'🇪🇸','España':'🇪🇸','Germany':'🇩🇪','Alemania':'🇩🇪',
  'Italy':'🇮🇹','Italia':'🇮🇹','Portugal':'🇵🇹','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿',
  'Netherlands':'🇳🇱','Belgium':'🇧🇪','Croatia':'🇭🇷','Serbia':'🇷🇸',
  'Denmark':'🇩🇰','Switzerland':'🇨🇭','Austria':'🇦🇹','Poland':'🇵🇱',
  'Czech Republic':'🇨🇿','Hungary':'🇭🇺','Romania':'🇷🇴','Slovakia':'🇸🇰',
  'Slovenia':'🇸🇮','Ukraine':'🇺🇦','Turkey':'🇹🇷','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'Wales':'🏴󠁧󠁢󠁷󠁬󠁳󠁿','USA':'🇺🇸','United States':'🇺🇸','Mexico':'🇲🇽',

let _isAdmin = false;
async function init(){
  const p=new URLSearchParams(location.search);
  _token=p.get('token')||localStorage.getItem('tok_fix');
  if(!_token){
    // Sin token — mostrar error en lugar de auto-login
    document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f1117;color:#e8ecf4;font-family:system-ui;flex-direction:column;gap:12px;">' +
      '<div style="font-size:2rem;">🔒</div>' +
      '<div style="font-size:1rem;font-weight:700;">Acceso restringido</div>' +
      '<div style="font-size:.85rem;color:#7a8499;">Abrí esta página desde el <a href="/BECBUC-portal" style="color:#E05020;">BECBUC Portal</a></div>' +
      '</div>';
    return;
  }
  // Verificar rol del usuario
  try {
    const me = await api('/auth/me');
    const roles = Array.isArray(me.roles) ? me.roles.map(r => r.name) : [];
    _isAdmin = roles.includes('superadmin') || roles.includes('admin');
  } catch {}
  await loadActivas();
}
async function api(path,opts={}){
  const{headers:xh,...rest}=opts;
  const h={'Content-Type':'application/json',...(xh||{})};
  if(_token) h['Authorization']=`Bearer ${_token}`;
  let r=await fetch(`${BASE}/api/v1${path}`,{headers:h,...rest});
  if(r.status===401){
    // Token expirado — limpiar y mostrar error
    localStorage.removeItem('tok_fix');
    _token=null;
    alert('Tu sesión expiró. Por favor, ingresá nuevamente desde el BECBUC Portal.');
    window.location.href='/BECBUC-portal';
    throw new Error('Sesión expirada');
  }
  if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||r.statusText);}
  return r.json();
}

/* ── Render fixture ──────────────────────────────────────────────────────────*/
let _koFaseIds=[];

async function renderFixture(){
  if(!_torneoActivo) return;
  const main=document.getElementById('mainArea');
  main.innerHTML=`<div class="loader"><div class="spinner"></div>Cargando fixture…</div>`;
  try{
    const data=await api(`/torneo/torneos/${_torneoActivo.id}/fixture`);
    const fases=(data.fases||[]).sort((a,b)=>a.orden-b.orden);
    if(!fases.length){main.innerHTML=`<div class="empty"><div class="big">📭</div>Sin datos.</div>`;return;}

    _allFases=fases;
    _allPartidos=fases.flatMap(f=>(f.partidos||[]).map(p=>({
      ...p, fase_nombre:f.nombre, fase_tipo:f.tipo
    })));

    const grupoFases=fases.filter(f=>f.tipo==='grupo');
    const koFases=fases.filter(f=>f.tipo!=='grupo');
    _koFaseIds=koFases.map(f=>f.id);

    // Mejores terceros: 3.º de cada grupo ordenado por pts/DG/GF
    const terceros=[];
    for(const f of grupoFases){
      const st=[...(f.standings||[])];
      if(st.length<3) continue;
      st.sort((a,b)=>{
        if((b.pts||0)!==(a.pts||0)) return (b.pts||0)-(a.pts||0);
        const da=(a.gf||0)-(a.gc||0), db=(b.gf||0)-(b.gc||0);
        if(db!==da) return db-da;
        return (b.gf||0)-(a.gf||0);
      });
      terceros.push({...st[2], grupo:f.nombre});
    }
    const hasTerceros=terceros.length>0;

    // Header
    let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <span style="font-size:22px">${_torneoActivo.emoji||'⚽'}</span>
      <h2 style="font-size:17px;font-weight:700;flex:1">${esc(_torneoActivo.nombre)}</h2>
    </div>`;

    // Visibilidad apostador
    html+=`<details style="margin-bottom:14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <summary style="padding:8px 14px;cursor:pointer;font-size:12px;font-weight:600;
        list-style:none;display:flex;align-items:center;gap:8px;user-select:none">
        ⚙️ Visibilidad para apostadores
      </summary>
      <div style="padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;border-top:1px solid var(--border)">
        ${fases.map(f=>`
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;
            padding:4px 10px;background:var(--bg4);border-radius:6px;
            border:1px solid ${f.visible_apostador!==false?'var(--success)':'var(--border)'}">
            <input type="checkbox" id="vis_${f.id}" ${f.visible_apostador!==false?'checked':''}
              onchange="toggleFaseVisibility(${f.id},this.checked)"
              style="accent-color:var(--success)">
            <span style="color:${f.visible_apostador!==false?'var(--success)':'var(--muted)'}"
              id="vis_lbl_${f.id}">${esc(f.nombre)}</span>
          </label>`).join('')}
      </div>
    </details>`;

    // Tabs principales
    const tabs=[];
    if(grupoFases.length) tabs.push({key:'grupos', label:'🏟 Fase de Grupos'});
    if(hasTerceros)        tabs.push({key:'terceros', label:'🏅 Mejores Terceros'});
    if(koFases.length)     tabs.push({key:'playoffs', label:'⚔️ Playoffs'});
    tabs.push({key:'cal', label:'📅 Calendario'});
    const firstKey=tabs[0]?.key||'cal';

    html+=`<div class="tabs" id="tabsBar">
      ${tabs.map(t=>`<div class="tab${t.key===firstKey?' active':''}" id="tab_${t.key}"
        onclick="showMainTab('${t.key}')">${t.label}</div>`).join('')}
    </div>`;

    // Sección Fase de Grupos
    if(grupoFases.length){
      html+=`<div id="sec_grupos">
        ${_renderActionBar('grupos')}
        ${renderGrupos(grupoFases)}
      </div>`;
    }

    // Sección Mejores Terceros
    if(hasTerceros){
      html+=`<div id="sec_terceros" style="display:none">
        ${renderMejoresTerceros(terceros)}
      </div>`;
    }

    // Sección Playoffs (bracket)
    if(koFases.length){
      // Verificar si todos los grupos tienen todos los partidos finalizados
      const totalGrupoPartidos = grupoFases.reduce((s,f)=>s+(f.partidos?.length||0),0);
      const totalGrupoFinalizados = grupoFases.reduce((s,f)=>s+(f.partidos?.filter(p=>p.estado==='finalizado').length||0),0);
      const gruposCompletos = totalGrupoPartidos > 0 && totalGrupoPartidos === totalGrupoFinalizados;

      const propagarBtn = _isAdmin ? `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 12px;
             background:${gruposCompletos?'rgba(34,197,94,.08)':'rgba(245,158,11,.08)'};
             border:1px solid ${gruposCompletos?'rgba(34,197,94,.25)':'rgba(245,158,11,.25)'};
             border-radius:8px;">
          <span style="font-size:.75rem;color:${gruposCompletos?'var(--green)':'var(--amber)'};">
            ${gruposCompletos
              ? '✅ Todos los grupos finalizados — listo para propagar'
              : `⚠️ Grupos incompletos (${totalGrupoFinalizados}/${totalGrupoPartidos} partidos finalizados)`}
          </span>
          <button class="btn btn-primary btn-sm" onclick="propagarBracket()" id="btnPropagar"
            ${gruposCompletos?'':'disabled'} style="margin-left:auto;white-space:nowrap;">
            ⚡ Propagar a 32avos y Mejores Terceros
          </button>
        </div>` : '';

      html+=`<div id="sec_playoffs" style="${grupoFases.length?'display:none':''}">
        ${propagarBtn}
        ${_renderActionBar('playoffs')}
        ${renderBracket(koFases)}
      </div>`;
    }

    // Sección Calendario
    html+=`<div id="sec_cal" style="display:none">${buildCalendario()}</div>`;

    main.innerHTML=html;
    _tabKeys=tabs.map(t=>t.key);
    _calView='list'; _calMesActivo=''; _calDiaActivo='';
  }catch(e){
    main.innerHTML=`<div class="empty">Error: ${esc(e.message)}</div>`;
  }
}

// Secuencia completa: grupos → mejores terceros → bracket R32 → R32 → bracket R16 → ... → Final
async function simularTodoSecuencial(ev){
  const btn=ev.currentTarget;
  const msg=document.getElementById('sim-msg-grupos');
  const tid=_torneoActivo.id;
  btn.disabled=true;

  const paso=(txt)=>{ btn.textContent=`⏳ ${txt}`; if(msg) msg.textContent=txt; };
  const FASE_LABEL={ronda32:'R32',ronda16:'Octavos',cuartos:'Cuartos',
                    semis:'Semis',tercer_puesto:'3er Puesto',final:'Final'};
  let gruposSimulados=0, totalKO=0;
  try{
    // 1. Fase de grupos — si ya están simulados (409) se omite y continúa con KO
    paso('Simulando grupos…');
    try{
      const rg=await api(`/bets/simular-resultados/${tid}`,{method:'POST'});
      gruposSimulados=rg.partidos_actualizados??0;
    }catch(eg){
      // 409 = grupos ya simulados, continuar de todos modos
      if(!eg.message.includes('encerrada')&&!eg.message.includes('409')) throw eg;
      paso('Grupos ya simulados — continuando con KO…');
    }

    // 2. Armar R32 desde standings (mejores terceros incluidos)
    paso('Armando bracket R32…');
    await api(`/bets/avanzar-bracket/${tid}`,{method:'POST'});

    // 3. Para cada fase KO en orden: simular → (bracket ya avanza interno) → siguiente
    const koFases=_allFases.filter(f=>f.tipo!=='grupo');
    if(!koFases.length){ paso('Sin fases KO — solo grupos simulados'); }
    for(const f of koFases){
      const lbl=FASE_LABEL[f.tipo]||f.nombre;
      paso(`Simulando ${lbl}…`);
      try{
        const r=await api(`/bets/simular-fase/${f.id}`,{method:'POST'});
        totalKO+=(r.partidos_actualizados??0);
      }catch(ef){
        // Si la fase está encerrada la saltamos (ya tenía resultados)
        if(ef.message.includes('encerrada')) { paso(`${lbl} ya tenía resultados — saltando…`); continue; }
        throw ef;
      }
    }
    // Avance final para asegurar bracket completo
    await api(`/bets/avanzar-bracket/${tid}`,{method:'POST'});

    const tot=gruposSimulados+totalKO;
    if(msg) msg.textContent=`✅ ${tot} partidos simulados (grupos + playoffs)`;
    btn.textContent='🎲 Simular todo (grupos → final)';
    btn.disabled=false;
    // Recargar fixture y mostrar Playoffs para ver el bracket actualizado
    await renderFixture();
    if(_tabKeys.includes('playoffs')) showMainTab('playoffs');
  }catch(e){
    alert('Error: '+e.message);
    btn.disabled=false; btn.textContent='🎲 Simular todo (grupos → final)';
    if(msg) msg.textContent='';
  }
}

// Solo playoffs desde el estado actual (asume grupos ya simulados)
async function simularRandPlayoffs(ev){
  const btn=ev.currentTarget;
  const msg=document.getElementById('sim-msg-playoffs');
  const tid=_torneoActivo.id;
  const koFases=_allFases.filter(f=>f.tipo!=='grupo');
  if(!koFases.length){ alert('Sin fases KO cargadas.'); return; }
  btn.disabled=true;
  let total=0;
  const FASE_LABEL={ronda32:'R32',ronda16:'Octavos',cuartos:'Cuartos',
                    semis:'Semis',tercer_puesto:'3er Puesto',final:'Final'};
  try{
    for(const f of koFases){
      const lbl=FASE_LABEL[f.tipo]||f.nombre;
      btn.textContent=`⏳ ${lbl}…`;
      // Avanzar bracket primero para que los slots estén asignados
      await api(`/bets/avanzar-bracket/${tid}`,{method:'POST'});
      try{
        const r=await api(`/bets/simular-fase/${f.id}`,{method:'POST'});
        total+=(r.partidos_actualizados??0);
      }catch(ef){
        if(ef.message.includes('encerrada')){ btn.textContent=`⏳ ${lbl} saltada…`; continue; }
        throw ef;
      }
    }
    // Avance final para cerrar bracket
    await api(`/bets/avanzar-bracket/${tid}`,{method:'POST'});
    if(msg) msg.textContent=`✅ ${total} partidos KO simulados`;
    btn.textContent='🎲 Simular playoffs'; btn.disabled=false;
    await renderFixture();
    if(_tabKeys.includes('playoffs')) showMainTab('playoffs');
  }catch(e){
    alert('Error: '+e.message);
    btn.disabled=false; btn.textContent='🎲 Simular playoffs';
    if(msg) msg.textContent='';
  }
}

async function actualizarAPI(ev){
  const btn=ev.currentTarget;
  const secKey=_tabKeys.find(k=>document.getElementById('sec_'+k)?.style.display!=='none')||'';
  const msg=document.getElementById('sim-msg-'+secKey);
  btn.disabled=true; btn.textContent='⏳ Cargando…';
  try{
    await api(`/torneo/torneos/${_torneoActivo.id}/cargar`,{method:'POST'});

    setTimeout(()=>renderFixture(),800);
  }catch(e){
    alert('Error: '+e.message);

  }
}

/* ── Bracket ─────────────────────────────────────────────────────────────────*/
function renderBracket(fases){
  const sorted=[...fases].sort((a,b)=>a.orden-b.orden);

  // Determinar cuáles fases están "desbloqueadas" (la fase anterior terminó)
  // Regla: fase[i] se desbloquea si TODOS los partidos de la fase con
  // mayor orden anterior a fase[i].orden están finalizados.
  // La primera fase (menor orden) siempre está desbloqueada (ya tiene equipos sembrados).
  const ordenesUnicos=[...new Set(sorted.map(f=>f.orden))].sort((a,b)=>a-b);

  // Mapa orden → todos los partidos de ese nivel
  const partidosPorOrden={};
  for(const f of sorted){
    if(!partidosPorOrden[f.orden]) partidosPorOrden[f.orden]=[];
    partidosPorOrden[f.orden].push(...(f.partidos||[]));
  }

  // Construir set de órdenes desbloqueados
  const ordenesDesbloqueados=new Set();
  for(let i=0;i<ordenesUnicos.length;i++){
    const ord=ordenesUnicos[i];
    if(i===0){
      ordenesDesbloqueados.add(ord); // primera ronda siempre visible
    } else {
      const ordPrev=ordenesUnicos[i-1];
      const prevParts=partidosPorOrden[ordPrev]||[];
      const prevFinalizado=prevParts.length>0 && prevParts.every(p=>p.estado==='finalizado');
      if(prevFinalizado) ordenesDesbloqueados.add(ord);
    }
  }

  const cols=sorted.map(fase=>{
    const pares=agruparPares(fase.partidos||[]);
    const desbloqueada=ordenesDesbloqueados.has(fase.orden);
    return {fase,pares,desbloqueada};
  });

  return `<div class="bracket"><div class="bracket-cols">
    ${cols.map(({fase,pares,desbloqueada})=>`
      <div class="bracket-col">
        <div class="bracket-col-title">${esc(fase.nombre)}</div>
        <div class="bracket-matches">
          ${desbloqueada
            ? pares.map(par=>renderBM(par)).join('')
            : _renderPlaceholderPares(pares.length)}
        </div>
      </div>`).join('')}
  </div></div>`;
}

function _renderPlaceholderPares(n){
  const slot=`<div class="bm" style="opacity:.55;">
    <div class="bm-row">
      <span style="width:18px;display:inline-block"></span>
      <span style="flex:1;color:var(--muted);font-style:italic;font-size:.75rem;">A definir</span>
      <span class="bm-score" style="color:var(--border)">–</span>
    </div>
    <div class="bm-row">
      <span style="width:18px;display:inline-block"></span>
      <span style="flex:1;color:var(--muted);font-style:italic;font-size:.75rem;">A definir</span>
      <span class="bm-score" style="color:var(--border)">–</span>
    </div>
  </div>`;
  return Array(Math.max(n,1)).fill(slot).join('');
}
function agruparPares(partidos){
  const ida=partidos.filter(p=>p.leg==='ida');
  const vuelta=partidos.filter(p=>p.leg==='vuelta');
  if(!ida.length) return partidos.map(p=>[p]);
  return ida.map(i=>{
    const v=vuelta.find(v2=>v2.equipo_local_id===i.equipo_visitante_id||v2.equipo_visitante_id===i.equipo_local_id);
    return v?[i,v]:[i];
  });
}
function renderBM(par){
  const[p1,p2]=par;
  const jugado=p1.estado==='finalizado'||(p2&&p2.estado==='finalizado');
  const oc=jugado?`onclick="openStats(${p1.id})"`:'';
  function row(p,side){
    const nm=side==='local'?esc(p.local_nombre_es||p.local_nombre||'?'):esc(p.visit_nombre_es||p.visit_nombre||'?');
    const logo=side==='local'?p.local_logo:p.visit_logo;
    const fl=teamFlag(side==='local'?(p.local_nombre_es||p.local_nombre||''):(p.visit_nombre_es||p.visit_nombre||''));
    const g1=side==='local'?p.goles_local:p.goles_visitante;
    const g2=p2?(side==='visitante'?p2.goles_local:p2.goles_visitante):null;
    const pen=side==='local'?p.penales_local:p.penales_visitante;
    const sc=g1!=null?`<span class="bm-score">${g1}${g2!=null?`<small style="font-weight:400;color:var(--muted)">+</small>${g2}`:''}`+
      `${pen!=null?`<span class="bm-pen">(${pen})</span>`:''}</span>`
      :`<span class="bm-score" style="color:var(--muted)">–</span>`;
    return `<div class="bm-row">
      ${logo?`<img src="${esc(logo)}" onerror="this.style.display='none'">`:fl?`<span style="font-size:16px">${fl}</span>`:'<span style="width:18px"></span>'}
      <span style="flex:1">${nm}</span>${sc}
    </div>`;
  }
  const leg=p2?`<div class="bm-leg">Ida / Vuelta</div>`:(p1.leg==='ida'?`<div class="bm-leg">Ida</div>`:'');
  const fecha=p1.fecha?`<div class="bm-date">${fmtFecha(p1.fecha)}</div>`:'';
  return `<div class="bm" ${oc}>${leg}${fecha}${row(p1,'local')}${row(p1,'visitante')}</div>`;
}

/* ══════════════════════════════════════════════════════════════
   CALENDARIO
══════════════════════════════════════════════════════════════ */
let _calView='list'; // 'month' | 'list'
let _calMesActivo='';
let _calDiaActivo='';
let _calFiltroEquipo='';
let _calFasesActivas=new Set(); // tipos de fase activos (vacío = todos)

function buildCalendario(){
  // Construir combo de equipos
  const equiposSet=new Map();
  for(const p of _allPartidos){
    const lN=p.local_nombre_es||p.local_nombre||'';
    const vN=p.visit_nombre_es||p.visit_nombre||'';
    if(lN) equiposSet.set(lN,{nombre:lN,logo:p.local_logo,flag:teamFlag(lN)});
    if(vN) equiposSet.set(vN,{nombre:vN,logo:p.visit_logo,flag:teamFlag(vN)});
  }
  const equipos=[...equiposSet.values()].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'));
  const equipoOpts=`<option value="">Todos los equipos</option>`+
    equipos.map(e=>`<option value="${esc(e.nombre)}">${e.flag||''} ${esc(e.nombre)}</option>`).join('');

  // Obtener fases únicas para pills
  const tiposUnicos=[...new Set(_allPartidos.map(p=>p.fase_tipo))];
  const fasePills=tiposUnicos.map(tipo=>{
    const meta=FASE_META[tipo]||{label:tradFase(tipo),icon:'⚽'};
    const on=_calFasesActivas.size===0||_calFasesActivas.has(tipo);
    return `<span class="phase-pill ${on?'on':'off'}" data-tipo="${tipo}" onclick="toggleFasePill(this,'${tipo}')">${meta.icon} ${meta.label}</span>`;
  }).join('');

  return `
  <div class="cal-toolbar">
    <div class="cal-view-toggle">
      <button id="btnViewList" class="${_calView==='list'?'active':''}" onclick="setCalView('list')">📋 Lista</button>
      <button id="btnViewMonth" class="${_calView==='month'?'active':''}" onclick="setCalView('month')">📅 Mes</button>
    </div>
    <div class="cal-month-nav">
      <button onclick="navMes(-1)">‹</button>
      <div class="cal-month-label" id="calMonthLabel">—</div>
      <button onclick="navMes(1)">›</button>
    </div>
    <select class="team-select" id="teamSelect" onchange="filtrarEquipo(this.value)">${equipoOpts}</select>
  </div>
  <div class="cal-filters">
    <span class="cal-filter-label">Fases:</span>
    <div class="phase-pills" id="fasePills">${fasePills}</div>
  </div>
  <div id="calContent" style="margin-top:12px"></div>`;
}

function setCalView(v){
  _calView=v;
  document.getElementById('btnViewList')?.classList.toggle('active',v==='list');
  document.getElementById('btnViewMonth')?.classList.toggle('active',v==='month');
  _renderCal();
}

function navMes(dir){
  if(!_calMesActivo) return;
  const[y,m]=_calMesActivo.split('-').map(Number);
  const d=new Date(y,m-1+dir,1);
  _calMesActivo=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  _calDiaActivo='';
  _renderCal();
}

function filtrarEquipo(val){
  _calFiltroEquipo=val;
  _renderCal();
}

function toggleFasePill(el,tipo){
  if(_calFasesActivas.has(tipo)){
    _calFasesActivas.delete(tipo);
    el.classList.remove('on'); el.classList.add('off');
  }else{
    _calFasesActivas.add(tipo);
    el.classList.remove('off'); el.classList.add('on');
  }
  _renderCal();
}

function _partidosFiltrados(){
  let ps=_allPartidos;
  if(_calFiltroEquipo){
    const q=_calFiltroEquipo.toLowerCase();
    ps=ps.filter(p=>
      (p.local_nombre_es||p.local_nombre||'').toLowerCase()===q||
      (p.visit_nombre_es||p.visit_nombre||'').toLowerCase()===q
    );
  }
  if(_calFasesActivas.size>0){
    ps=ps.filter(p=>_calFasesActivas.has(p.fase_tipo));
  }
  return ps;
}

function _renderCal(){
  if(!_calMesActivo) return;
  const[y,m]=_calMesActivo.split('-').map(Number);
  const label=new Date(y,m-1,1).toLocaleString('es-AR',{month:'long',year:'numeric'});
  const lblEl=document.getElementById('calMonthLabel');
  if(lblEl) lblEl.textContent=label.charAt(0).toUpperCase()+label.slice(1);

  const content=document.getElementById('calContent');
  if(!content) return;

  const ps=_partidosFiltrados();
  const porDia=agruparPorDia(ps);

  if(_calView==='month'){
    content.innerHTML=renderMesGrid(y,m,porDia);
  }else{
    // Vista lista: todos los días del mes seleccionado
    const diasMes=Object.keys(porDia).filter(d=>d.startsWith(_calMesActivo)).sort();
    if(_calDiaActivo && porDia[_calDiaActivo]){
      content.innerHTML=renderDiaDetalle(_calDiaActivo, porDia[_calDiaActivo]);
    }else{
      if(!diasMes.length){
        content.innerHTML=`<div class="cal-no-day">Sin partidos en este mes.</div>`;
        return;
      }
      content.innerHTML=diasMes.map(d=>renderDiaDetalle(d,porDia[d])).join('');
    }
  }
}

/* ── Vista MES (grid) ────────────────────────────────────────────────────────*/
function renderMesGrid(y,m,porDia){
  const hoy=new Date().toISOString().slice(0,10);
  const primer=new Date(y,m-1,1);
  const ultimo=new Date(y,m,0).getDate();
  let ini=primer.getDay(); // 0=Dom
  ini=(ini+6)%7; // ajustar a Lun=0

  const dias=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  let html=`<div class="cal-grid">
    <div class="cal-grid-header">${dias.map(d=>`<span>${d}</span>`).join('')}</div>`;

  let semana=`<div class="cal-week">`;
  // Celdas vacías al inicio
  for(let i=0;i<ini;i++) semana+=`<div class="cal-cell empty"></div>`;

  for(let d=1;d<=ultimo;d++){
    const key=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const psDia=porDia[key]||[];
    const isHoy=key===hoy;
    const isSel=key===_calDiaActivo;
    const jugados=psDia.filter(p=>p.estado==='finalizado').length;
    const vivos=psDia.filter(p=>p.estado==='en_juego').length;

    let matchesHtml='';
    const MAX_SHOW=2;
    psDia.slice(0,MAX_SHOW).forEach(p=>{
      const lN=p.local_nombre_es||p.local_nombre||'?';
      const vN=p.visit_nombre_es||p.visit_nombre||'?';
      const cl=p.estado==='en_juego'?'live':p.estado==='finalizado'?'played':'';
      const score=p.goles_local!=null?`${p.goles_local}-${p.goles_visitante}`:'vs';
      const lF=teamFlag(lN);const vF=teamFlag(vN);
      const lS=lF||(lN.substring(0,3).toUpperCase());
      const vS=vF||(vN.substring(0,3).toUpperCase());
      matchesHtml+=`<div class="cal-cell-match ${cl}">${lS} ${score} ${vS}</div>`;
    });
    if(psDia.length>MAX_SHOW) matchesHtml+=`<div class="cal-cell-more">+${psDia.length-MAX_SHOW} más</div>`;

    semana+=`<div class="cal-cell${isHoy?' today':''}${isSel?' selected':''}"
      onclick="selDia('${key}')" style="${!psDia.length?'opacity:.5':''}">
      <div class="cal-cell-num">${d}${vivos?'<span style="color:var(--danger);margin-left:3px">●</span>':''}</div>
      ${matchesHtml}
    </div>`;

    const diaOfWeek=(ini+d-1)%7;
    if(diaOfWeek===6&&d<ultimo){
      html+=semana+`</div>`;
      semana=`<div class="cal-week">`;
    }
  }
  // Celdas vacías al final
  const diaFin=(ini+ultimo-1)%7;
  if(diaFin<6){
    for(let i=diaFin+1;i<=6;i++) semana+=`<div class="cal-cell empty"></div>`;
  }
  html+=semana+`</div>`;
  html+=`</div>`;

  // Si hay día seleccionado, mostrar detalle debajo
  if(_calDiaActivo && porDia[_calDiaActivo]){
    html+=`<div style="margin-top:16px">${renderDiaDetalle(_calDiaActivo,porDia[_calDiaActivo])}</div>`;
  }
  return html;
}

function selDia(key){
  _calDiaActivo=_calDiaActivo===key?'':key;
  _renderCal();
}

/* ── Vista DÍA (lista) ───────────────────────────────────────────────────────*/
function renderDiaDetalle(dia,partidos){
  const hoy=new Date().toISOString().slice(0,10);
  let label='Fecha por confirmar';
  if(dia!=='sin-fecha'){
    const d=new Date(dia+'T12:00:00');
    label=d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    label=label.charAt(0).toUpperCase()+label.slice(1);
  }
  const esHoy=dia===hoy;
  return `
  <div style="margin-bottom:20px">
    <div class="cal-day-header">
      <div class="dh-fecha">${label}${esHoy?'<span class="today-pill" style="margin-left:8px">HOY</span>':''}</div>
      <div class="dh-count">${partidos.length} partido${partidos.length>1?'s':''}</div>
    </div>
    ${partidos.map(p=>renderCalMatch(p)).join('')}
  </div>`;
}

/* ── Tarjeta de partido en calendario ────────────────────────────────────────*/
const FASE_TAG_BG={
  clasificatoria:'#1e3a5f',playoff_prev:'#1e3a5f',grupo:'#1a2e1a',
  ronda32:'#2e1a1a',ronda16:'#2e1a1a',cuartos:'#3d1c02',
  semis:'#4a1c02',tercer_puesto:'#1a1a2e',final:'#4a3800',
};

function renderCalMatch(p){
  const jugado=p.estado==='finalizado';
  const vivo=p.estado==='en_juego';
  const lN=esc(p.local_nombre_es||p.local_nombre||'?');
  const vN=esc(p.visit_nombre_es||p.visit_nombre||'?');
  const lL=p.local_logo,vL=p.visit_logo;
  const lF=teamFlag(p.local_nombre_es||p.local_nombre||'');
  const vF=teamFlag(p.visit_nombre_es||p.visit_nombre||'');

  const logo=(logo,flag,side)=>{
    if(logo) return `<img src="${esc(logo)}" onerror="this.style.display='none'" style="width:26px;height:26px;object-fit:contain;flex-shrink:0">`;
    if(flag) return `<span style="font-size:22px;flex-shrink:0">${flag}</span>`;
    return '';
  };

  let centro='';
  if(jugado||vivo){
    let sub='';
    if(p.penales_local!=null) sub=`<div class="cal-sub">pen. ${p.penales_local}–${p.penales_visitante}</div>`;
    else if(p.goles_local_prorroga!=null) sub=`<div class="cal-sub">p.e.</div>`;
    centro=`<div class="cal-center">
      <div class="cal-score-big${vivo?' live-score':''}">
        ${p.goles_local??'–'}<span class="sep">–</span>${p.goles_visitante??'–'}
      </div>${sub}</div>`;
  }else{
    const hora=p.fecha?fmtHora(p.fecha):'–:––';
    centro=`<div class="cal-center"><div class="cal-hora">${hora}</div></div>`;
  }

  const tagBg=FASE_TAG_BG[p.fase_tipo]||'var(--bg4)';
  const faseMeta=FASE_META[p.fase_tipo]||{label:tradFase(p.fase_nombre||p.fase_tipo),icon:'⚽'};
  const oc=jugado?`onclick="openStats(${p.id})"`:'';

  return `<div class="cal-match${jugado?' jugado':''}${vivo?' live-match':''}" ${oc}>
    <span class="cal-fase-tag" style="background:${tagBg}">${faseMeta.icon} ${esc(p.fase_nombre)}</span>
    <div class="cal-team" style="justify-content:flex-end">
      ${logo(lL,lF,'left')}
      <span class="tname" style="text-align:right">${lN}</span>
    </div>
    ${centro}
    <div class="cal-team">
      <span class="tname">${vN}</span>
      ${logo(vL,vF,'right')}
    </div>
  </div>`;
}

/* ── Helpers ─────────────────────────────────────────────────────────────────*/
function agruparPorDia(partidos){
  const map={};
  for(const p of partidos){
    const key=p.fecha?new Date(p.fecha).toISOString().slice(0,10):'sin-fecha';
    if(!map[key]) map[key]=[];
    map[key].push(p);
  }
  for(const k of Object.keys(map))
    map[k].sort((a,b)=>!a.fecha?1:!b.fecha?-1:new Date(a.fecha)-new Date(b.fecha));
  return map;
}
function fmtFecha(iso){try{return new Date(iso).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}catch{return iso;}}
function fmtHora(iso){try{return new Date(iso).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});}catch{return '';}}

/* ── Modal estadísticas ──────────────────────────────────────────────────────*/
async function openStats(id){
  const modal=document.getElementById('statsModal');
  modal.style.display='flex';
  document.getElementById('statsBody').innerHTML=
    `<div class="loader"><div class="spinner"></div>Cargando estadísticas…</div>`;
  try{
    const d=await api(`/torneo/partidos/${id}/estadisticas`);
    document.getElementById('statsTitle').textContent=
      `${d.partido?.local_nombre||'?'} vs ${d.partido?.visit_nombre||'?'}`;
    document.getElementById('statsBody').innerHTML=renderStats(d);
  }catch(e){
    document.getElementById('statsBody').innerHTML=
      `<div class="empty">Sin estadísticas disponibles.<br><small>${esc(e.message)}</small></div>`;
  }
}
function closeStatsModal(){document.getElementById('statsModal').style.display='none';}
function closeStats(e){if(e.target.id==='statsModal') closeStatsModal();}

function renderStats(d){
  const p=d.partido||{},st=d.estadisticas||[],ev=d.eventos||[];
  let sub='';
  if(p.goles_local_prorroga!=null) sub+=`<div class="sb-sub">Prórroga: ${p.goles_local_prorroga} – ${p.goles_visitante_prorroga}</div>`;
  if(p.penales_local!=null) sub+=`<div class="sb-sub" style="color:var(--warn)">Penales: ${p.penales_local} – ${p.penales_visitante}</div>`;
  const fecha=p.fecha?new Date(p.fecha).toLocaleString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
  const lF=teamFlag(p.local_nombre||'');const vF=teamFlag(p.visit_nombre||'');
  let html=`<div class="scoreboard">
    <div class="sb-teams">
      <div class="sb-team">
        ${p.local_logo?`<img src="${esc(p.local_logo)}" onerror="this.style.display='none'">`:lF?`<span style="font-size:40px">${lF}</span>`:''}
        <div class="sb-name">${esc(p.local_nombre||'?')}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="sb-score">${p.goles_local??'–'}</div>
          <div class="sb-sep">–</div>
          <div class="sb-score">${p.goles_visitante??'–'}</div>
        </div>${sub}
      </div>
      <div class="sb-team">
        ${p.visit_logo?`<img src="${esc(p.visit_logo)}" onerror="this.style.display='none'">`:vF?`<span style="font-size:40px">${vF}</span>`:''}
        <div class="sb-name">${esc(p.visit_nombre||'?')}</div>
      </div>
    </div>
    <div class="sb-meta">${fecha}${p.sede?' · '+esc(p.sede):''}${p.ciudad?' · '+esc(p.ciudad):''}</div>
  </div>`;
  if(st.length>=2) html+=renderStatsBars(st[0],st[1]);
  if(ev.length) html+=renderEventos(ev);
  if(!st.length&&!ev.length) html+=`<div style="text-align:center;padding:20px;color:var(--muted)">Sin estadísticas detalladas disponibles.</div>`;
  return html;
}

function renderStatsBars(s1,s2){
  const STATS=[
    {k:'posesion',l:'Posesión',f:v=>v!=null?v+'%':'–'},
    {k:'tiros_total',l:'Tiros totales',f:v=>v??'–'},
    {k:'tiros_al_arco',l:'Al arco',f:v=>v??'–'},
    {k:'pases_total',l:'Pases',f:v=>v??'–'},
    {k:'pases_precision',l:'Precisión pases',f:v=>v!=null?v+'%':'–'},
    {k:'corners',l:'Córners',f:v=>v??'–'},
    {k:'faltas',l:'Faltas',f:v=>v??'–'},
    {k:'tarjetas_amarillas',l:'Amarillas',f:v=>v??'–'},
    {k:'tarjetas_rojas',l:'Rojas',f:v=>v??'–'},
    {k:'fueras_de_juego',l:'Fuera de juego',f:v=>v??'–'},
  ];
  const n1=esc(s1.nombre_es||s1.nombre||'Local'),n2=esc(s2.nombre_es||s2.nombre||'Visitante');
  let html=`<div class="stats-section"><h3>Estadísticas</h3>
    <div class="stats-header"><span class="shn">${n1}</span><span></span><span class="shn right">${n2}</span></div>`;
  STATS.forEach(({k,l,f})=>{
    const v1=s1[k],v2=s2[k];if(v1==null&&v2==null)return;
    const a=parseFloat(v1)||0,b=parseFloat(v2)||0,tot=a+b||1;
    const p1=Math.round(a/tot*100),p2=Math.round(b/tot*100);
    html+=`<div class="stat-row">
      <div><div class="stat-val">${f(v1)}</div><div class="bar-wrap bar-l"><div class="bar" style="width:${p1}%"></div></div></div>
      <div class="stat-lbl">${l}</div>
      <div><div class="stat-val right">${f(v2)}</div><div class="bar-wrap bar-r"><div class="bar" style="width:${p2}%"></div></div></div>
    </div>`;
  });
  return html+`</div>`;
}
function renderEventos(evs){
  const IC={gol:'⚽',penal:'⚽',autogol:'🤦',penal_fallado:'❌',amarilla:'🟨',roja:'🟥',sustitucion:'🔄'};
  let html=`<div class="eventos-section"><h3>Eventos</h3>`;
  evs.forEach(ev=>{
    const ic=IC[ev.tipo]||'•';
    const min=ev.minuto?`${ev.minuto}${ev.minuto_extra?`+${ev.minuto_extra}`:''}′`:'';
    const asi=ev.asistencia_nombre?` <span style="color:var(--muted)">(${esc(ev.asistencia_nombre)})</span>`:'';
    html+=`<div class="ev-item">
      <div class="ev-min">${min}</div>
      <div class="ev-icon">${ic}</div>
      <div class="ev-info"><div>${esc(ev.jugador_nombre||'')}${asi}</div>
        <div class="ev-eq">${esc(ev.equipo_nombre||'')}</div></div>
    </div>`;
  });
  return html+`</div>`;
}

async function inferirPos(ev, id){
  ev.stopPropagation();
  const btn=ev.currentTarget;
  btn.textContent='⏳…'; btn.disabled=true;
  try{
    const r=await api(`/torneo/torneos/${id}/inferir-posiciones`,{method:'POST'});
    btn.textContent=`✅ ${r.actualizadas} actualizada${r.actualizadas!==1?'s':''}`;
    setTimeout(()=>{btn.textContent='🔢 Inferir posiciones';btn.disabled=false;},3000);
  }catch(e){
    alert('Error: '+e.message);
    btn.textContent='🔢 Inferir posiciones';btn.disabled=false;
  }
}

function inferirPosiciones(arr){
  const total=arr.length;
  const usados=new Set(arr.map(s=>s.posicion).filter(Boolean));
  const faltantes=[];
  for(let i=1;i<=total;i++) if(!usados.has(i)) faltantes.push(i);
  let fi=0;
  arr.forEach(s=>{ if(!s.posicion) s.posicion=faltantes[fi++]||null; });
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
