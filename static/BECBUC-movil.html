<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b111d">
<title>BECBUC · Polla Mundialista</title>
<style>
  :root{
    --bg:#0b111d; --bg2:#111a2b; --card:#16203400; --row:#16203a; --row2:#1b2740;
    --line:#283450; --line2:#324063; --text:#e9eefa; --muted:#8b99b8; --muted2:#5a6788;
    --orange:#e8551f; --orange2:#ff7a45; --orange-d:#b53c12;
    --green:#27d07c; --green-d:#0e6b3f; --amber:#fbbf24; --red:#fb6f6f; --indigo:#8b93ff;
    --gold:#ffd23f;
    --rad:13px; --tabh:60px; --maxw:880px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:var(--bg); color:var(--text); font-size:14px; line-height:1.4;
    padding-bottom:calc(var(--tabh) + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  img{max-width:100%}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}
  .wrap{max-width:var(--maxw);margin:0 auto}

  /* ── Topbar ── */
  .topbar{
    position:sticky;top:0;z-index:40;
    display:flex;align-items:center;gap:10px;
    padding:calc(env(safe-area-inset-top) + 11px) 15px 11px;
    background:linear-gradient(180deg,#0b111d,#0b111deb);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    max-width:var(--maxw);margin:0 auto;
  }
  .logo{width:33px;height:33px;border-radius:9px;flex:none;
    background:linear-gradient(135deg,var(--orange2),var(--orange-d));
    display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.8rem;color:#fff;letter-spacing:-.5px}
  .tt-title{font-weight:800;font-size:1rem;line-height:1;letter-spacing:-.2px}
  .tt-sub{font-size:.62rem;color:var(--muted);margin-top:2px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .spacer{flex:1}
  .user-chip{display:flex;align-items:center;gap:7px;background:var(--row);border:1px solid var(--line);border-radius:20px;padding:4px 10px 4px 4px;font-size:.72rem;max-width:130px}
  .user-chip span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .avatar{width:24px;height:24px;border-radius:50%;flex:none;background:linear-gradient(135deg,var(--indigo),#5b63e0);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;color:#fff}
  .logout{background:none;border:none;color:var(--muted);font-size:1.05rem;padding:4px}

  /* ── Pages ── */
  .page{display:none;padding:12px 13px 18px;animation:fade .18s ease}
  .page.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .ptitle{font-size:1.05rem;font-weight:800;margin:2px 2px 10px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
  .ptitle small{font-weight:500;color:var(--muted);font-size:.68rem;display:block;margin-top:3px}

  /* ── Banner ── */
  .banner{border-radius:var(--rad);padding:9px 12px;font-size:.74rem;margin-bottom:11px;display:flex;gap:8px;align-items:center;font-weight:500}
  .banner.ok{background:rgba(39,208,124,.1);border:1px solid rgba(39,208,124,.28);color:var(--green)}
  .banner.warn{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--amber)}
  .banner.info{background:rgba(139,147,255,.1);border:1px solid rgba(139,147,255,.28);color:var(--indigo)}
  .fe-chips{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin:2px 0 8px}
  .fe-lbl{font-size:.64rem;color:var(--muted);margin-right:2px}
  .fe-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:999px;font-size:.66rem;font-weight:600;white-space:nowrap}
  .fe-chip.open{background:rgba(39,208,124,.14);border:1px solid rgba(39,208,124,.4);color:var(--green)}
  .fe-chip.lock{background:rgba(148,163,184,.12);border:1px solid var(--border);color:var(--muted)}
  .fe-chip{cursor:pointer}
  .fe-chip.sel{background:var(--accent,#e05020);border-color:var(--accent,#e05020);color:#fff}

  /* ── Group chips (scroll horizontal) ── */
  .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 9px;margin:0 -3px 4px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;background:var(--row);border:1px solid var(--line);color:var(--muted);
    border-radius:20px;padding:6px 13px;font-size:.74rem;font-weight:700;white-space:nowrap;transition:.12s}
  .chip.active{background:linear-gradient(135deg,var(--orange),var(--orange-d));border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(232,85,31,.35)}
  .chip .c-pend{font-size:.6rem;opacity:.75;margin-left:4px}

  /* ── Group block ── */
  .gblock{margin-bottom:18px;scroll-margin-top:130px}
  .ghead{display:flex;align-items:center;gap:8px;margin:0 2px 9px;font-size:.82rem;font-weight:800;color:var(--orange2);text-transform:uppercase;letter-spacing:.6px}
  .ghead .pill{margin-left:auto;background:var(--row);border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:2px 8px;font-size:.6rem;font-weight:600;letter-spacing:0;text-transform:none}

  /* layout responsive: en tablet, fixture + tabla lado a lado */
  .gcols{display:grid;grid-template-columns:1fr;gap:11px}

  /* ── Match card (Bet365 density) ── */
  .mc{background:var(--row);border:1px solid var(--line);border-radius:11px;padding:9px 10px;margin-bottom:8px;transition:border-color .14s,background .14s}
  .mc.has-pred{border-color:rgba(232,85,31,.55);background:var(--row2)}
  .mc.fin{background:#131826}
  .mc-meta{font-size:.58rem;color:var(--muted2);margin-bottom:7px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
  .mc-meta .fb{background:rgba(39,208,124,.16);color:var(--green);border-radius:5px;padding:1px 6px;letter-spacing:0}
  .mc-meta .fb-live{background:rgba(239,68,68,.15);color:#f87171;border-radius:5px;padding:1px 6px;letter-spacing:0;display:inline-flex;align-items:center;gap:3px;}
  .mc-live-bar{display:flex;align-items:center;gap:5px;padding:3px 8px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);border-radius:7px;margin-top:4px;flex-wrap:wrap;justify-content:center;font-size:.7rem;}
  .mc-live-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:mlp 1.1s ease-in-out infinite;}
  @keyframes mlp{0%,100%{opacity:1}50%{opacity:.2}}
  .mc-live-score{font-weight:900;font-size:.9rem;color:var(--text);}
  .mc-live-min{color:#f87171;font-size:.65rem;font-weight:700;}
  .mc-live-stat{color:var(--muted2);font-size:.67rem;}
  .mc-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:7px}
  .team{display:flex;align-items:center;gap:7px;min-width:0}
  .team.r{flex-direction:row-reverse;text-align:right}
  .tname{font-size:.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* flags */
  .flag{position:relative;width:26px;height:19px;border-radius:3px;flex:none;overflow:hidden;background:var(--line)}
  .flag .fl-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800;color:var(--muted)}
  .flag img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .flag.sm{width:20px;height:15px}
  .flag.sm .fl-ph{font-size:.55rem}

  /* score input boxes (cuota style) */
  .sin{display:flex;align-items:center;gap:5px}
  .sin input{width:40px;height:42px;text-align:center;font-size:1.18rem;font-weight:800;
    background:var(--bg2);border:1.5px solid var(--line2);border-radius:9px;color:var(--text);transition:.12s;padding:0}
  .sin input:focus{outline:none;border-color:var(--orange);background:#1a2336}
  .sin .dash{color:var(--muted2);font-weight:800}
  .sfin{display:flex;align-items:center;gap:7px;font-size:1.2rem;font-weight:900}
  .sfin .dash{color:var(--muted);font-size:.85rem;font-weight:600}

  /* comparison (finalized) */
  .cmp{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);display:flex;align-items:center;gap:7px;font-size:.7rem;flex-wrap:wrap}
  .cmp .lbl{color:var(--muted)} .cmp .val{font-weight:800}
  .ptsb{margin-left:auto;border-radius:7px;padding:3px 9px;font-size:.7rem;font-weight:900}
  .pts-3{background:rgba(39,208,124,.2);color:var(--green)}
  .pts-1{background:rgba(251,191,36,.2);color:var(--amber)}
  .pts-0{background:rgba(251,111,111,.16);color:var(--red)}

  /* bonus */
  .btog{margin-top:8px;background:none;border:1px dashed var(--line2);color:var(--indigo);border-radius:8px;padding:6px;font-size:.66rem;font-weight:700;width:100%;display:flex;align-items:center;justify-content:center;gap:6px}
  .btog.on{background:rgba(139,147,255,.1);border-style:solid}
  .bbody{display:none;margin-top:8px;gap:7px;grid-template-columns:1fr 1fr 1fr}
  .bbody.open{display:grid}
  .bfld label{display:block;font-size:.55rem;color:var(--muted);margin-bottom:3px;text-align:center;font-weight:600}
  .bfld input,.bfld select{width:100%;height:32px;text-align:center;font-size:.78rem;font-weight:700;background:var(--bg2);border:1px solid var(--line);border-radius:7px;color:var(--text)}
  .bfld input:focus,.bfld select:focus{outline:none;border-color:var(--indigo)}

  /* ── Standings (mini sim + real) ── */
  .stbox{background:var(--row);border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:12px}
  .stbox-h{padding:8px 11px;font-size:.66rem;font-weight:800;color:var(--orange2);background:var(--row2);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
  .stbox-h .live{margin-left:auto;font-size:.55rem;color:var(--green);background:rgba(39,208,124,.14);border-radius:5px;padding:1px 6px;letter-spacing:0}
  table.st{width:100%;border-collapse:collapse;font-size:.7rem}
  table.st th{padding:5px 2px;color:var(--muted);font-weight:600;font-size:.55rem;text-transform:uppercase;border-bottom:1px solid var(--line)}
  table.st td{padding:6px 2px;text-align:center;border-bottom:1px solid rgba(40,52,80,.45)}
  table.st tr:last-child td{border-bottom:none}
  table.st .l{text-align:left;padding-left:6px}
  table.st .pos{width:20px;font-weight:800;color:var(--muted2)}
  table.st tr.q1 .pos{color:var(--green)} table.st tr.q1 .pos::after{content:" ●";color:var(--green);font-size:.5rem}
  table.st tr.q2 .pos{color:var(--amber)}
  table.st tr.q3 .pos{color:var(--indigo)}
  table.st .tc{display:flex;align-items:center;gap:6px}
  table.st .nm{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px}
  table.st .pts{font-weight:900;color:var(--text)}
  .gdp{color:var(--green)} .gdn{color:var(--red)}
  .st-leg{font-size:.58rem;color:var(--muted2);padding:7px 11px;border-top:1px solid var(--line);display:flex;gap:11px;flex-wrap:wrap}
  .st-leg b{font-weight:700}

  /* ── Bracket ── */
  .br-sec{margin-bottom:18px}
  .br-sec-h{font-size:.82rem;font-weight:800;color:var(--orange2);text-transform:uppercase;letter-spacing:.5px;margin:0 2px 9px;display:flex;align-items:center;gap:7px}
  .r32{display:grid;grid-template-columns:1fr;gap:8px}
  .r32m{background:var(--row);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .r32m .num{font-size:.55rem;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
  .r32t{display:flex;align-items:center;gap:7px;padding:3px 0}
  .r32t .slot{font-size:.56rem;color:var(--orange2);font-weight:800;background:rgba(232,85,31,.12);border-radius:5px;padding:1px 5px;flex:none;min-width:24px;text-align:center}
  .r32t .nm{font-size:.76rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .r32t.tbd .nm{color:var(--muted2);font-style:italic;font-weight:500}
  .r32 .vs{font-size:.55rem;color:var(--muted2);text-align:center;font-weight:700;margin:1px 0}
  /* terceros */
  .terc{background:var(--row);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  table.terc-t{width:100%;border-collapse:collapse;font-size:.72rem}
  table.terc-t th{padding:6px 3px;color:var(--muted);font-size:.55rem;text-transform:uppercase;border-bottom:1px solid var(--line);font-weight:600}
  table.terc-t td{padding:7px 3px;text-align:center;border-bottom:1px solid rgba(40,52,80,.45)}
  table.terc-t tr:last-child td{border-bottom:none}
  table.terc-t .l{text-align:left;padding-left:8px}
  table.terc-t tr.in td{background:rgba(39,208,124,.06)}
  table.terc-t tr.out{opacity:.5}
  table.terc-t .qmark{font-weight:800}
  table.terc-t tr.in .qmark{color:var(--green)} table.terc-t tr.out .qmark{color:var(--red)}
  .clasif-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .clasif-g{background:var(--row);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .clasif-g .g-l{font-size:.6rem;color:var(--muted);font-weight:800;text-transform:uppercase;margin-bottom:6px}
  .clasif-g .c-t{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.74rem}
  .clasif-g .c-t .badge{font-size:.55rem;font-weight:800;border-radius:4px;padding:1px 5px;flex:none}
  .b1{background:rgba(39,208,124,.18);color:var(--green)} .b2{background:rgba(251,191,36,.18);color:var(--amber)}
  .clasif-g .c-t .nm{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ── Ranking ── */
  table.rk{width:100%;border-collapse:collapse;font-size:.74rem;background:var(--row);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  table.rk th{padding:8px 3px;font-size:.55rem;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--line);font-weight:700}
  table.rk td{padding:9px 3px;text-align:center;border-bottom:1px solid rgba(40,52,80,.45)}
  table.rk tr:last-child td{border-bottom:none}
  table.rk .l{text-align:left;padding-left:9px}
  table.rk .pos{font-weight:800;width:30px}
  table.rk tr.me{background:rgba(232,85,31,.1)}
  table.rk tr.me .nm{color:var(--orange2)}
  table.rk .medal{font-size:.95rem}
  table.rk .nm{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:118px}
  table.rk .tot{font-weight:900;color:var(--orange2)}
  .rk-leg{font-size:.6rem;color:var(--muted2);margin:9px 3px 0;line-height:1.7}

  /* ── Mensajes ── */
  .msg{background:var(--row);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:9px;position:relative}
  .msg.unread{border-color:rgba(139,147,255,.5)}
  .msg.unread::after{content:"";position:absolute;top:13px;right:13px;width:8px;height:8px;border-radius:50%;background:var(--indigo)}
  .msg-h{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .msg-n{background:var(--row2);color:var(--muted);border-radius:6px;padding:2px 7px;font-size:.6rem;font-weight:800;flex:none}
  .msg-t{font-weight:800;font-size:.86rem}
  .msg-b{font-size:.8rem;color:#ccd5ea;white-space:pre-wrap}
  .msg-f{margin-top:7px;font-size:.6rem;color:var(--muted2);display:flex;gap:10px}

  /* ── Save bar ── */
  .savebar{position:fixed;left:0;right:0;bottom:calc(var(--tabh) + env(safe-area-inset-bottom));z-index:35;padding:9px 13px;background:linear-gradient(180deg,transparent,var(--bg) 26%);display:none}
  .savebar.show{display:block}
  .savebar .in{max-width:var(--maxw);margin:0 auto;display:flex;gap:9px;align-items:center}
  .btn-save{flex:1;background:linear-gradient(135deg,var(--orange),var(--orange-d));border:none;color:#fff;font-weight:800;font-size:.9rem;border-radius:11px;padding:13px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 18px rgba(232,85,31,.4)}
  .btn-save:disabled{opacity:.45;box-shadow:none}
  .btn-ghost{background:var(--row);border:1px solid var(--line);color:var(--muted);border-radius:11px;padding:13px 15px;font-weight:800;font-size:.95rem}
  .sc{background:#ffffff33;border-radius:6px;padding:1px 8px;font-size:.74rem;font-weight:800}

  /* ── Transparencia por fase ── */
  .tp-sec{font-size:.82rem;font-weight:800;color:var(--orange2);margin:16px 2px 8px;letter-spacing:-.2px}
  .tp-sec:first-of-type{margin-top:4px}
  .tp-empty,.tp-mut{color:var(--muted);font-size:.74rem;padding:8px 2px}
  .tp-card{background:var(--row);border:1px solid var(--line);border-radius:11px;padding:9px 11px;margin-bottom:9px}
  .tp-card.me{border-color:var(--orange);background:rgba(232,85,31,.08)}
  .tp-rk-h{display:flex;align-items:center;gap:8px}
  .tp-pos{font-weight:800;font-size:.85rem;min-width:22px;text-align:center}
  .tp-nm{font-weight:700;font-size:.82rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tp-card.me .tp-nm{color:var(--orange2)}
  .tp-tot{font-weight:900;color:var(--orange2);font-size:.95rem}
  .tp-faserow{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .tp-fchip{background:var(--row2);border:1px solid var(--line);border-radius:8px;padding:3px 7px;font-size:.62rem;color:var(--muted);font-weight:600}
  .tp-fchip b{color:var(--text);font-weight:800;margin-right:3px}
  .tp-fchip i{color:var(--muted2);font-style:normal;margin-left:3px}
  .tp-fchip.terc{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3);color:var(--amber)}
  .tp-gh{font-weight:800;font-size:.76rem;margin-bottom:5px}
  .tp-grow{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);padding:2px 0}
  .tp-grow.cls{color:var(--green);font-weight:700}
  .tp-grow.terc{color:var(--amber);font-weight:700}
  .tp-kom{padding:5px 0;border-top:1px solid rgba(40,52,80,.45)}
  .tp-kom:first-of-type{border-top:none}
  .tp-kol{display:flex;justify-content:space-between;gap:8px;font-size:.72rem}
  .tp-kol b{font-weight:800;white-space:nowrap}
  .tp-win{color:var(--green);font-weight:700;font-size:.66rem;margin-top:2px}
  .tp-mh{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:.78rem;margin-bottom:6px}
  .tp-bet{border-top:1px solid rgba(40,52,80,.45);padding:6px 0}
  .tp-bet:first-of-type{border-top:none}
  .tp-bet-h{display:flex;align-items:center;gap:7px}
  .tp-mx{color:var(--muted2);font-size:.64rem;font-weight:700}
  .tp-sc{flex:1;font-size:.74rem}
  .tp-sc i{color:var(--muted2);font-style:normal;font-size:.62rem;margin:0 2px}
  .tp-sc b{font-weight:800}
  .tp-bet-items{display:flex;gap:9px;margin-top:4px;font-size:.66rem;color:var(--muted)}
  .tp-chip{font-weight:800;font-size:.66rem;padding:2px 8px;border-radius:7px}
  .tp-chip.ok{background:rgba(39,208,124,.16);color:var(--green)}
  .tp-chip.gray{background:var(--row2);color:var(--muted2)}
  .tp-chip-mini{font-weight:800}
  .tp-dash{color:var(--muted2)}
  .tp-bet-items .tp-chip{padding:1px 5px}
  .tp-selwrap{display:flex;align-items:center;gap:7px;margin:2px 2px 9px;font-size:.72rem;color:var(--muted)}
  .tp-sel{flex:1;background:var(--row2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:.76rem;font-weight:700}
  .tp-mteams{display:flex;flex-direction:column;gap:2px;min-width:96px}
  .tp-mtl{display:flex;align-items:center;gap:4px;font-size:.66rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tp-mteams .tp-mx{margin-top:1px}

<script>
/* ════════ Estado ════════ */
const base = window.location.origin;
let token = sessionStorage.getItem('bec_token') || localStorage.getItem('tok_fix') || '';
let _me=null, _isAdmin=false, _isSuper=false, _torneoId=null, _torneoNombre='';
let _adminViewAs=null;
function _viewAsParam(){return _adminViewAs?'?for_apostador_id='+_adminViewAs.id:'';}
function setViewAsM(id,nombre){_adminViewAs={id,nombre};_bracketDirty=true;_misApuestas={};loadPronos();}
function clearViewAsM(){_adminViewAs=null;_bracketDirty=true;_misApuestas={};loadPronos();}
async function populatePronApostadorSel(rk){
  const sel=document.getElementById('pronViewAsSel');
  if(!sel)return;
  sel.innerHTML='<option value="">Yo mismo</option>';
  for(const r of rk){
    const opt=document.createElement('option');
    opt.value=r.apostador_id;
    opt.textContent=(r.nombre||r.alias||r.apostador_id)+' ('+(r.puntos_total||0)+'pts)';
    if(_adminViewAs&&_adminViewAs.id===r.apostador_id)opt.selected=true;
    sel.appendChild(opt);
  }
}
function handleViewAsChangeM(sel){
  const id=parseInt(sel.value)||null;
  if(!id){clearViewAsM();return;}
  const nombre=sel.options[sel.selectedIndex].textContent.split(' (')[0];
  setViewAsM(id,nombre);
}
let _periodo={abierto:true, apuesta_fin:null};
let _faseEst=null;
let _faseTapMsg='';
let _pronosTab='grupos'; // 'grupos' | 'playoffs' | 'globales'
let _grupos=[];           // /bets/grupos (standings + partidos)
let _misApuestas={};      // partido_id -> apuesta guardada
let _slip={};             // partido_id -> cambios sin guardar
let _ranking=[], _mensajes=[], _bracket=null, _bracketDirty=true;
let _koSlipM={};   // KO bracket: {partido_id:{pred_local,pred_visitante,pred_penales}}
let _lastKoMapM={}; // { num: ko_item } — versión mapeada del último ko_bracket cargado
const BK_FEEDERS_M={
  89:['W74','W77'],90:['W73','W75'],91:['W76','W78'],92:['W79','W80'],
  93:['W83','W84'],94:['W81','W82'],95:['W86','W88'],96:['W85','W87'],
  97:['W89','W90'],98:['W93','W94'],99:['W91','W92'],100:['W95','W96'],
  101:['W97','W98'],102:['W99','W100'],103:['P101','P102'],104:['W101','W102'],
};
let _curGroup=null;       // letra de grupo activa (pronós/grupos)
const MSG_READ_KEY='becbuc_msg_read';
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function api(path,opts={}){
  const {headers:xh,...rest}=opts;
  const h={'Content-Type':'application/json','ngrok-skip-browser-warning':'true',...(xh||{})};
  if(token) h['Authorization']='Bearer '+token;
  const r=await fetch(base+path,{headers:h,...rest});
  if(r.status===401){token='';sessionStorage.removeItem('bec_token');localStorage.removeItem('tok_fix');showLogin();throw new Error('Sesión expirada');}
  if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||r.statusText);}
  return r.json();
}
function toast(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='toast show '+t;clearTimeout(e._t);e._t=setTimeout(()=>e.className='toast',2600);}

/* ════════ Login ════════ */
function showLogin(){
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('topbar').style.display='none';
  document.getElementById('tabs').style.display='none';
  document.getElementById('savebar').classList.remove('show');
}
async function doLogin(){
  const u=document.getElementById('lgUser').value.trim(), p=document.getElementById('lgPass').value;
  const err=document.getElementById('lgErr'), btn=document.getElementById('lgBtn');
  err.textContent='';
  if(!u||!p){err.textContent='Completá usuario y contraseña.';return;}

function betParen(pl,pv,rl,rv){
  if(pl==null||pv==null||rl==null||rv==null) return '';
  pl=+pl;pv=+pv;rl=+rl;rv=+rv;
  let color;
  if(pl===rl&&pv===rv) color='#22d3ee';
  else{const w=(l,v)=>l>v?'L':l===v?'E':'V'; color=w(pl,pv)===w(rl,rv)?'var(--green)':'var(--red)';}
  return ` <span style="color:${color};font-weight:800;font-size:.7em">(${pl}-${pv})</span>`;
}

/* ════════ Simulación de grupo (cliente) ════════ */
function predFor(p){
  const s=_slip[p.id]; if(s&&s.pred_local!=null&&s.pred_visitante!=null) return [s.pred_local,s.pred_visitante];
  const a=_misApuestas[p.id]; if(a&&a.pred_local!=null&&a.pred_visitante!=null) return [a.pred_local,a.pred_visitante];
  if(p.estado==='finalizado'&&p.goles_local!=null) return [p.goles_local,p.goles_visitante];
  return null;
}
function simGroup(g){
  const T={};
  (g.standings||[]).forEach(e=>{T[e.equipo_id]={equipo_id:e.equipo_id,nombre:e.nombre,logo_url:e.logo_url,fifa_ranking:e.fifa_ranking||999,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,gd:0,pts:0};});
  let usados=0;
  (g.partidos||[]).forEach(p=>{
    const pr=predFor(p); if(!pr) return;
    const L=T[p.local_id], V=T[p.visit_id]; if(!L||!V) return;
    const[gl,gv]=pr; usados++;
    L.pj++;V.pj++; L.gf+=gl;L.gc+=gv;V.gf+=gv;V.gc+=gl; L.gd+=gl-gv;V.gd+=gv-gl;
    if(gl>gv){L.pg++;L.pts+=3;V.pp++;} else if(gl<gv){V.pg++;V.pts+=3;L.pp++;} else {L.pe++;V.pe++;L.pts++;V.pts++;}
  });
  const rows=Object.values(T).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||(a.fifa_ranking-b.fifa_ranking));
  return {rows,usados,total:(g.partidos||[]).length};
}

/* ══ Control de tasa API — auto-refresh partidos de hoy (móvil) ═══════════
   Budget: 7500 calls/día. Intervalo = max(30s, secsRestantes/budgetRestante × nPartidos)
══════════════════════════════════════════════════════════════════════════ */
const _M_HOY_BUDGET=7500;
let _mHoyCalls=0, _mHoyCallsDay=new Date().toDateString(), _mHoyTimer=null;

function _mHoyConsumir(){
  const d=new Date().toDateString();
  if(d!==_mHoyCallsDay){_mHoyCalls=0;_mHoyCallsDay=d;}
  _mHoyCalls++;
}
function _mHoyIntervalMs(n){
  const now=new Date(), d=now.toDateString();
  if(d!==_mHoyCallsDay){_mHoyCalls=0;_mHoyCallsDay=d;}
  const mid=new Date(now);mid.setHours(24,0,0,0);
  const secs=Math.max(60,(mid-now)/1000);
  const bud=Math.max(1,_M_HOY_BUDGET-_mHoyCalls);
  return Math.max(30,Math.ceil(secs/bud)*Math.max(1,n))*1000;
}

async function _renderTodayBarM(){
  clearTimeout(_mHoyTimer);
  const bar=document.getElementById('m-today-bar');
  if(!bar||!_torneoId) return;
  const hoy=new Date().toLocaleDateString('sv');
  let partidos=[],apMap={};
  try{
    _mHoyConsumir();
    const [pts,misAp]=await Promise.all([
      api(`/api/v1/bets/partidos-hoy/${_torneoId}?fecha=${hoy}`),
      api(`/api/v1/bets/mis-apuestas/${_torneoId}`).catch(()=>[]),
    ]);
    // El backend devuelve ventana amplia (±14h); filtrar aquí por fecha LOCAL
    partidos=(pts||[]).filter(p=>{
      if(!p.fecha) return false;
      return new Date(p.fecha).toLocaleDateString('sv')===hoy;
    });
    for(const a of misAp) apMap[a.partido_id]=a;
  }catch(e){ console.warn('partidos-hoy error:',e); }

  if(!partidos.length){
    bar.innerHTML=`<span style="color:var(--muted);font-size:.7rem;padding:0 4px;">📅 Sin partidos hoy</span>`;
    return;
  }

  let totalPts=0;
  bar.innerHTML=partidos.map(p=>{
    const ap=apMap[p.id]||_misApuestas[p.id];
    const fin=p.estado==='finalizado';
    const enVivo=!fin&&p.goles_local!=null;
    const hasScore=fin||enVivo;
    const hora=new Date(p.fecha).toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'});
    const pts=ap?(ap.puntos||0)+(ap.puntos_bonus||0):null;
    if(pts&&hasScore) totalPts+=pts;
    const logo=(url,nm)=>url
      ?`<img src="${url}" style="width:18px;height:13px;object-fit:contain;border-radius:2px;flex-shrink:0;" onerror="this.style.display='none'" alt="">`
      :`<span style="width:18px;height:13px;background:var(--surface2);border-radius:2px;display:inline-flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;flex-shrink:0;">${(nm||'?').charAt(0)}</span>`;
    const scoreHtml=hasScore
      ?`<span style="font-size:.82rem;font-weight:900;${enVivo?'color:var(--amber)':''}">${p.goles_local}–${p.goles_visitante}</span><span style="font-size:.5rem;color:${enVivo?'var(--amber)':'var(--muted2)'};">${fin?'FIN':'● VIVO'}</span>`
      :`<span style="font-size:.68rem;color:var(--muted2);font-weight:600;">${hora}</span>`;
    const predHtml=ap
      ?`<span style="font-size:.58rem;color:var(--muted2);">Pred:<b style="color:var(--fg)">${ap.pred_local}–${ap.pred_visitante}</b></span>`
      :`<span style="font-size:.56rem;color:var(--muted2);font-style:italic;">sin pronós</span>`;
    const ptsHtml=pts!=null&&hasScore
      ?`<span style="font-size:.62rem;font-weight:800;color:${pts>0?'var(--green)':'var(--muted2)'};">+${pts}pts</span>`:'';
    return `<div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;background:var(--card);border:1px solid var(--line);border-radius:9px;min-width:82px;">
      <div style="display:flex;align-items:center;gap:3px;">${logo(p.local_logo,p.local_nombre)}<span style="font-size:.6rem;max-width:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${(p.local_nombre||'').substring(0,9)}</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">${scoreHtml}</div>
      <div style="display:flex;align-items:center;gap:3px;">${logo(p.visit_logo,p.visit_nombre)}<span style="font-size:.6rem;max-width:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${(p.visit_nombre||'').substring(0,9)}</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">${predHtml}${ptsHtml}</div>
    </div>`;
  }).join('');

  // Badge de total del día (si hay puntos)
  if(totalPts>0){
    bar.insertAdjacentHTML('beforeend',`<div style="flex-shrink:0;display:flex;align-items:center;padding:5px 8px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:9px;font-size:.72rem;font-weight:800;color:var(--green);white-space:nowrap;">+${totalPts}<br>pts hoy</div>`);
  }

  const msNext=_mHoyIntervalMs(partidos.length);
  _mHoyTimer=setTimeout(_renderTodayBarM,msNext);
}

function _updateLiveDOMM(newGrupos){
  for(const g of newGrupos){
    // 1. Actualizar standings del grupo (sin inputs)
    const stwrap=document.getElementById(`stwrap-${g.fase_id}`);
    if(stwrap) stwrap.innerHTML=standingsBox(g,true,true);
    // 2. Actualizar barra live y meta-label por partido
    for(const p of g.partidos){
      const mcEl=document.getElementById(`mc-${p.id}`);
      if(!mcEl) continue;
      // Actualizar meta label (En vivo / Programado / Final)
      const metaEl=mcEl.querySelector('.mc-meta');
      if(metaEl){
        const fin=p.estado==='finalizado'&&p.goles_local!=null&&p.goles_visitante!=null;
        const isLive=p.estado==='en_juego';
        const realRef=fin?`<span class="gbc-badge" style="background:rgba(34,197,94,.12);color:var(--green);font-weight:700;font-size:.62rem">⚽ ${p.goles_local}–${p.goles_visitante}</span>`:'';
        const metaLbl=fin
          ?`J${p.jornada||'?'} <span class="fb">Final</span> ${realRef}`
          :isLive
            ?`J${p.jornada||'?'} <span class="fb-live">🔴 En vivo</span>`
            :`J${p.jornada||'?'} · Programado`;
        metaEl.innerHTML=metaLbl;
      }
      // Actualizar / insertar / eliminar barra live
      let liveBarEl=mcEl.querySelector('.mc-live-bar');
      if(p.estado==='en_juego'){
        const gl=p.goles_local??'?', gv=p.goles_visitante??'?';
        const min=p.minuto_actual!=null?`<span class="mc-live-min">${p.minuto_actual}'</span>`:'';
        const am=p.amarillas!=null?`🟨${p.amarillas}`:'';
        const ro=(p.rojas!=null&&p.rojas>0)?`🟥${p.rojas}`:'';
        const stats=[am,ro].filter(Boolean).join(' ');
        const inner=`<span class="mc-live-dot"></span><span class="mc-live-score">${gl}–${gv}</span>${min}`
          +(stats?`<span class="mc-live-stat">${stats}</span>`:'');
        if(!liveBarEl){
          liveBarEl=document.createElement('div');
          liveBarEl.className='mc-live-bar';
          // Insertar después de .mc-meta y antes de .mc-row
          const mcRow=mcEl.querySelector('.mc-row');
          mcEl.insertBefore(liveBarEl, mcRow||null);
        }
        liveBarEl.innerHTML=inner;
      } else if(liveBarEl){
        liveBarEl.remove();
      }
    }
  }
}

async function _doLiveRefreshM(){
  _mLiveTimer=null;
  if(!_torneoId||_mLiveRefreshing) return;
  _mLiveRefreshing=true;
  try{
    const newGrupos=await api(`/api/v1/bets/grupos/${_torneoId}`).catch(()=>null);
    if(newGrupos){
      _grupos=newGrupos;
      // Actualización quirúrgica — NO re-renderiza el tab completo (preserva inputs y bonus)
      if(_pronosTab==='grupos') _updateLiveDOMM(newGrupos);
    }
    // En-vivo tab: re-render completo es aceptable (no tiene inputs de predicción)
    if(_pronosTab==='envivo'){
      const el=document.getElementById('pron-content');
      if(el) await _renderPronosEnVivoM(el).catch(()=>{});
    }
  }catch(e){/* silent */}
  finally{_mLiveRefreshing=false;}
  if(_hasLiveMatchesM()) _mLiveTimer=setTimeout(_doLiveRefreshM,_M_LIVE_MS);
}
function _startLiveRefreshM(){if(_mLiveTimer) return; if(_hasLiveMatchesM()) _mLiveTimer=setTimeout(_doLiveRefreshM,_M_LIVE_MS);}
function _stopLiveRefreshM(){if(_mLiveTimer){clearTimeout(_mLiveTimer);_mLiveTimer=null;}}

function _renderPronosTercerosM(el){
  el.innerHTML='<div class="loader"><span class="spin">◌</span> Calculando…</div>';
  if(!_bracket){
    if(_bracketDirty){
      // Intentar cargar bracket silenciosamente
      api('/api/v1/bets/mi-bracket/'+_torneoId+_viewAsParam()).then(mb=>{
        _bracket=mb;
        _bracketDirty=false;
        _renderPronosTercerosM(el);
      }).catch(()=>{
        el.innerHTML=empty('🏅','Sin datos de grupos','Guardá pronósticos de grupos primero.');
      });
      return;
    }
    el.innerHTML=empty('🏅','Sin datos aún','Guardá pronósticos de grupos para ver los mejores terceros.');
    return;
  }
  const b=_bracket;
  const mej=b.mejores_terceros||[], elim=b.terceros_eliminados||[];
  const allZero=[...mej,...elim].every(t=>!t.pts);
  if((!mej.length&&!elim.length)||allZero){
    el.innerHTML=empty('🏅','Sin terceros aún','Guardá más pronósticos de grupos para calcular los mejores terceros.');
    return;
  }
  let h=`<div style="font-size:.7rem;color:var(--muted);margin-bottom:8px">Calculado según tus pronósticos guardados.</div>`;
  h+='<table class="terc-t"><thead><tr><th class="qmark"></th><th></th><th class="l">Equipo</th><th>Gr</th><th>Pts</th><th>DG</th></tr></thead><tbody>';
  mej.forEach((t,i)=>{h+=tercRow(t,i+1,true);});
  elim.forEach((t,i)=>{h+=tercRow(t,mej.length+i+1,false);});
  h+='</tbody></table><div class="rk-leg">Los 8 mejores terceros (de 12 grupos) avanzan a la Ronda de 32.</div>';
  el.innerHTML=h;
}

async function _renderPronosPlayoffsM(el){
  el.innerHTML='<div class="loader"><span class="spin">◌</span> Cargando bracket…</div>';
  try{
    const [mb,br,mis,faseEst]=await Promise.all([
      api('/api/v1/bets/mi-bracket/'+_torneoId+_viewAsParam()),
      api('/api/v1/bets/bracket-real/'+_torneoId).catch(()=>({partidos:[]})),
      token?api('/api/v1/bets/mis-apuestas/'+_torneoId+_viewAsParam()).catch(()=>[]):Promise.resolve([]),
      api('/api/v1/bets/fases-apuesta-estado/'+_torneoId).catch(()=>null),
    ]);
    _bracket=mb;
    _bracketReal=(br&&br.partidos)||[];
    _bracketDirty=false;
    _koSlipM={};
    _faseEst=faseEst;
    (mis||[]).forEach(a=>{_misApuestas[a.partido_id]=a;});

    // Si no hay predicciones de grupos → bracket todo "Por definir"
    const hasGroupPreds=(mis||[]).some(a=>a.pred_local!==null||a.pred_visitante!==null);
    if(!hasGroupPreds){
      el.innerHTML=empty('🏆','Todos los partidos Por definir','Ingresá pronósticos de grupos para ver tu bracket.');
      return;
    }

    const koData=mb.ko_bracket||[];
    _lastKoMapM={};
    for(const m of koData) _lastKoMapM[m.num]=m;
    const realMap={};
    (_bracketReal||[]).forEach(m=>{realMap[m.num]=m;});
    let h='';
    // Botón admin: inicializar brackets
    if(_isAdmin){
      h+=`<div style="margin:4px 0 8px;padding:7px 10px;background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.25);border-radius:9px;display:flex;align-items:center;gap:8px;">
        <span style="font-size:.65rem;color:var(--amber);flex:1">⚙️ Admin</span>
        <button style="background:rgba(251,191,36,.18);border:1px solid var(--amber);color:var(--amber);font-size:.62rem;padding:3px 10px;border-radius:8px;font-weight:700"
          onclick="inicializarBracketsAdminM()">🔄 Inicializar brackets</button>
      </div>`;
    }
    if(koData.length){
      h+=`<div style="display:flex;align-items:center;gap:6px;margin:4px 2px 8px;">
        <span style="font-size:.72rem;font-weight:800;color:var(--muted2);text-transform:uppercase;letter-spacing:.4px">Tu bracket simulado</span>
        <button class="btn-act" style="font-size:.58rem;padding:2px 8px;flex-shrink:0"
          onclick="_bracketDirty=true;_renderPronosPlayoffsM(document.getElementById('pron-content'))" title="Recalcular desde servidor">🔄</button>
      </div>`;
      // Clasificados directos
      h+='<div class="br-sec"><div class="br-sec-h">✅ Clasificados directos</div><div class="clasif-grid">';
      (mb.grupos_simulados||[]).forEach(g=>{
        const eqs=g.equipos||[];
        const t1=eqs[0], t2=eqs[1];
        h+=`<div class="clasif-g"><div class="g-l">Grupo ${esc(g.grupo)}</div>
          ${t1?`<div class="c-t"><span class="badge b1">1º</span>${flag(t1.logo_url,t1.nombre_es||t1.nombre,'sm')}<span class="nm">${esc(t1.nombre_es||t1.nombre)}</span></div>`:''}
          ${t2?`<div class="c-t"><span class="badge b2">2º</span>${flag(t2.logo_url,t2.nombre_es||t2.nombre,'sm')}<span class="nm">${esc(t2.nombre_es||t2.nombre)}</span></div>`:''}</div>`;
      });
      h+='</div></div>';
    }else{
      h+=`<div class="banner info">Guardá pronósticos de grupos para ver tu bracket.</div>`;
    }
    // Mejores terceros (calculados desde pronósticos del apostador)
    {
      const _mej=mb.mejores_terceros||[], _elim=mb.terceros_eliminados||[];
      const _allZero=[..._mej,..._elim].every(t=>!t.pts);
      if((_mej.length||_elim.length)&&!_allZero){
        h+='<div class="br-sec" style="margin-top:10px"><div class="br-sec-h">🥉 Mejores terceros</div><div class="terc"><table class="terc-t"><thead><tr><th class="qmark"></th><th></th><th class="l">Equipo</th><th>Gr</th><th>Pts</th><th>DG</th></tr></thead><tbody>';
        _mej.forEach((t,i)=>{h+=tercRow(t,i+1,true);});
        _elim.forEach((t,i)=>{h+=tercRow(t,_mej.length+i+1,false);});
        h+='</tbody></table></div><div class="rk-leg">Los 8 mejores terceros (de 12 grupos) avanzan a la Ronda de 32.</div></div>';
      }
    }
    // Resultados reales de playoffs
    if((_bracketReal||[]).some(p=>p.finalizado)) h+=_realBracketM();
    // Pronósticos por fase
    h+=_renderPlayoffPhasesM(koData,realMap,faseEst);
    el.innerHTML=h;
    _syncKOSaveBtnsMFase();
    _wireNavM(el,'input.bk-m-inp');
  }catch(e){el.innerHTML=empty('⚔️','Sin bracket aún',esc(e.message));}
}

function _renderPlayoffPhasesM(koData,realMap,faseEst){
  const PHASES=[
    {tipo:'ronda32',       label:'R32 · Dieciseisavos', nums:[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88]},
    {tipo:'ronda16',       label:'Ronda de 16',      nums:[89,90,91,92,93,94,95,96]},
    {tipo:'cuartos',       label:'Cuartos',           nums:[97,98,99,100]},
    {tipo:'semis',         label:'Semifinales',       nums:[101,102]},
    {tipo:'tercer_puesto', label:'Tercer Puesto',     nums:[103]},
    {tipo:'final',         label:'Final',             nums:[104]},
  ];
  const koMap={};
  for(const m of koData) koMap[m.num]=m;
  const byTipo={};
  for(const f of (faseEst?.fases||[])) byTipo[f.tipo]=f;

  let h=`<div class="br-sec"><div class="br-sec-h" style="margin-bottom:10px">📝 Pronósticos de Playoffs</div>`;
  for(const phase of PHASES){
    const fi=byTipo[phase.tipo];
    const bloqueada=fi?fi.bloqueada:true;
    const faseId=fi?.fase_id;
    const pids=phase.nums.map(n=>koMap[n]?.partido_id).filter(Boolean);
    const lockIc=bloqueada
      ?`<span style="color:var(--muted);font-size:.75rem">🔒</span>`
      :`<span style="color:var(--green);font-size:.75rem">🔓</span>`;
    const motivoColor=bloqueada?'var(--amber)':'var(--green)';
    const motivo=fi?.motivo?`<span class="prono-phase-status-m" style="color:${motivoColor}">${bloqueada?'🔒':'🔓'} ${esc(fi.motivo)}</span>`:'';
    const lockColor=bloqueada?'var(--muted)':'var(--text)';
    const acts=(faseId&&pids.length)?`<div class="prono-phase-acts-m">
      <button class="btn-act" style="font-size:.62rem;padding:4px 9px" onclick="fillRandomKOFaseM(${JSON.stringify(pids)})">🎲 Random</button>
      <button class="btn-act primary" style="font-size:.62rem;padding:4px 9px" id="bk-fasem-save-${faseId}" onclick="submitKOFaseBetsM(${faseId},${JSON.stringify(pids)})" disabled>💾 (<span id="bk-fasem-cnt-${faseId}">0</span>)</button>
    </div>`:'';
    h+=`<div style="margin-bottom:14px">
      <div class="prono-phase-hdr-m">${lockIc}<span class="prono-phase-label-m" style="color:${lockColor}">${phase.label}</span>${motivo}${acts}</div>
      <div class="r32">${_koCardsM(phase.nums,koMap,realMap,true)}</div>
    </div>`;
  }
  h+=`<div id="bk-playoffs-msg-m" style="font-size:.72rem;color:var(--muted);padding:4px 0"></div></div>`;
  return h;
}

function _koCardsM(nums,koMap,realMap,forceEdit=false){
  return nums.map(num=>{
    const ko=koMap[num],real=realMap[num];
    const feeders=BK_FEEDERS_M[num];
    const feederLabel=feeders?feeders.join('·'):'';
    const pid=ko?.partido_id;
    const lObj=ko?.local,vObj=ko?.visitante;
    const lName=lObj?(lObj.nombre_es||lObj.nombre||'?'):null;
    const vName=vObj?(vObj.nombre_es||vObj.nombre||'?'):null;
    const lF=lObj?.logo_url?flag(lObj.logo_url,lName,'sm'):'';
    const vF=vObj?.logo_url?flag(vObj.logo_url,vName,'sm'):'';
    const lD=lName?esc(lName):`<span style="color:var(--muted);font-style:italic">TBD</span>`;
    const vD=vName?esc(vName):`<span style="color:var(--muted);font-style:italic">TBD</span>`;
    const sv=pid?(_misApuestas[pid]||{}):{}; const sl=pid?(_koSlipM[pid]||{}):{};
    const pgl=sl.pred_local!==undefined?sl.pred_local:(sv.pred_local??'');
    const pgv=sl.pred_visitante!==undefined?sl.pred_visitante:(sv.pred_visitante??'');
    const ppen=sl.pred_penales!==undefined?sl.pred_penales:(sv.pred_penales??null);
    const pltanda=sl.pred_penales_local_tanda!==undefined?sl.pred_penales_local_tanda:(sv.pred_penales_local_tanda??'');
    const pvtanda=sl.pred_penales_visitante_tanda!==undefined?sl.pred_penales_visitante_tanda:(sv.pred_penales_visitante_tanda??'');
    const pmg=sl.pred_minuto_gol!==undefined?sl.pred_minuto_gol:(sv.pred_minuto_gol??'');
    const pam=sl.pred_amarillas!==undefined?sl.pred_amarillas:(sv.pred_amarillas??'');
    const pvar=sl.pred_var!==undefined?sl.pred_var:(sv.pred_var??'');
    const hasBonus=pmg!==''||pam!==''||pvar!=='';
    const fin=real?.finalizado;
    const teamsOk=fin&&lObj&&vObj&&real.local?.id===ko?.local_id&&real.visitante?.id===ko?.visit_id;
    const cmpR=teamsOk?_bkCmpM(pgl===''?null:pgl,pgv===''?null:pgv,real?.gl,real?.gv):null;
    const tuvoP=fin&&real?.pen_l!=null&&real?.pen_v!=null;
    const cmpBadge=cmpR?({pleno:'<span style="color:#f59e0b;font-weight:800">⭐</span>',acierto:'<span style="color:#22c55e;font-weight:800">✅</span>',fallo:'<span style="color:#ef4444;font-weight:800">✗</span>'})[cmpR]
      :(fin&&!teamsOk&&lObj&&vObj?'<span style="color:#ef4444;font-size:.6rem">✗ equipos</span>':'');
    const penBadge=(fin&&ppen!==null)?(ppen===tuvoP?'<span style="color:#22c55e;font-size:.65rem">⚽✓</span>':'<span style="color:#ef4444;font-size:.65rem">⚽✗</span>'):'';
    let body='';
    let finRefM='';
    if(fin){
      const predL=(pgl!==''&&pgl!=null&&pgv!==''&&pgv!=null)?`${pgl}–${pgv}`:'—';
      const realL=`⚽${real.gl}–${real.gv}${tuvoP?` (p${real.pen_l}–${real.pen_v})`:''}`;
      if(forceEdit){
        // En popup edición: referencia compacta del resultado real
        finRefM=`<div style="font-size:.62rem;background:rgba(34,197,94,.08);border-radius:3px;padding:2px 6px;margin-bottom:3px;display:flex;gap:6px;align-items:center">
          <span style="color:var(--green);font-weight:700">${realL}</span>
          <span style="color:var(--muted)">🎯${predL}</span>${cmpBadge}${penBadge}
        </div>`;
      }else{
        body=`<div class="bk-m-teams">
          <div class="bk-m-t">${lF}<span class="nm">${lD}</span></div>
          <div class="bk-m-sc" style="font-size:.65rem;font-weight:700;gap:4px">🎯${predL} ${cmpBadge}${penBadge}</div>
          <div class="bk-m-t r">${vF}<span class="nm">${vD}</span></div>
        </div>
        <div class="bk-m-real">${realL}</div>`;
      }
    }
    if(!body&&pid){
      // Editable siempre que haya partido_id (equipos pueden ser TBD aún)
      const lRow=lObj?`${lF}<span class="nm">${lD}</span>`:`<span class="nm" style="color:var(--muted);font-style:italic">Por definir</span>`;
      const vRow=vObj?`${vF}<span class="nm">${vD}</span>`:`<span class="nm" style="color:var(--muted);font-style:italic">Por definir</span>`;
      const lNP=lName||'L', vNP=vName||'V';
      body=`${finRefM}<div class="bk-m-teams">
        <div class="bk-m-t">${lRow}</div>
        <div class="bk-m-sc"><input class="bk-m-inp" type="number" min="0" max="20" value="${pgl}" placeholder="—" oninput="onBkScoreM(${pid},'l',this.value)"><span>–</span><input class="bk-m-inp" type="number" min="0" max="20" value="${pgv}" placeholder="—" oninput="onBkScoreM(${pid},'v',this.value)"></div>
        <div class="bk-m-t r">${vRow}</div>
      </div>
      <div class="bk-m-foot" data-pen-pid="${pid}" style="gap:4px;flex-wrap:wrap">
        <span style="font-size:.6rem;color:var(--muted)">🥅 Tanda:</span>
        <input class="bk-m-inp" type="number" min="0" max="20" value="${pltanda}"
          oninput="onBkTandaM(${pid},'l',this.value)" placeholder="L"
          title="${esc(lNP)}" style="width:34px">
        <span style="font-size:.6rem;color:var(--muted)">–</span>
        <input class="bk-m-inp" type="number" min="0" max="20" value="${pvtanda}"
          oninput="onBkTandaM(${pid},'v',this.value)" placeholder="V"
          title="${esc(vNP)}" style="width:34px">
        <span class="pen-req-warn" data-pen-pid="${pid}" style="display:none">⚠ req.</span>
        <button class="btog${hasBonus?' on':''}" style="margin-left:auto;font-size:.6rem;padding:3px 7px" onclick="document.getElementById('bkbm-${pid}').classList.toggle('open');this.classList.toggle('on')">⚡${hasBonus?' ✓':''}</button>
      </div>
      <div class="bbody${hasBonus?' open':''}" id="bkbm-${pid}" style="padding:6px 0 2px">
        <div class="bfld"><label style="font-size:.6rem">Min 1er gol</label><input type="number" inputmode="numeric" min="1" max="120" value="${pmg}" oninput="onBkBonusM(${pid},'pred_minuto_gol',this.value)" style="width:60px"></div>
        <div class="bfld"><label style="font-size:.6rem">Amarillas</label><input type="number" inputmode="numeric" min="0" max="20" value="${pam}" oninput="onBkBonusM(${pid},'pred_amarillas',this.value)" style="width:60px"></div>
        <div class="bfld"><label style="font-size:.6rem">VAR</label><select onchange="onBkBonusM(${pid},'pred_var',this.value)" style="font-size:.65rem;padding:2px 4px">
          <option value="" ${pvar===''||pvar==null?'selected':''}>—</option>
          <option value="1" ${pvar==1?'selected':''}>Sí</option>
          <option value="0" ${pvar==0?'selected':''}>No</option>
        </select></div>
      </div>`;
    }else{
      body=`<div class="bk-m-teams">
        <div class="bk-m-t">${lF}<span class="nm">${lD}</span></div>
        <div class="bk-m-sc" style="color:var(--muted);font-style:italic;font-size:.65rem">Por definir</div>
        <div class="bk-m-t r">${vF}<span class="nm">${vD}</span></div>
      </div>`;
    }
    return `<div class="r32m" id="bkcm-${num}"><div class="num">P${num}${feederLabel?` <span style="font-size:.55rem;color:var(--muted2)">${feederLabel}</span>`:''}</div>${body}</div>`;
  }).join('');
}

function _syncKOSaveBtnsMFase(){
  const PHASES=[
    {tipo:'ronda32',nums:[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88]},
    {tipo:'ronda16',nums:[89,90,91,92,93,94,95,96]},
    {tipo:'cuartos',nums:[97,98,99,100]},
    {tipo:'semis',nums:[101,102]},
    {tipo:'tercer_puesto',nums:[103]},
    {tipo:'final',nums:[104]},
  ];
  for(const phase of PHASES){
    const fi=_faseEst?.fases?.find(f=>f.tipo===phase.tipo);
    if(!fi) continue;
    const faseId=fi.fase_id;
    const saveBtn=document.getElementById(`bk-fasem-save-${faseId}`);
    const cntEl=document.getElementById(`bk-fasem-cnt-${faseId}`);
    if(!saveBtn) continue;
    // Contar items en _koSlipM que pertenecen a esta fase vía DOM
    const pidsInPhase=new Set();
    for(const n of phase.nums){
      const card=document.getElementById(`bkcm-${n}`);
      if(card){
        const inp=card.querySelector('input.bk-m-inp');
        if(inp){
          const onc=inp.getAttribute('oninput')||'';
          const m=onc.match(/onBkScoreM\((\d+)/);
          if(m) pidsInPhase.add(+m[1]);
        }
      }
    }
    const count=[...pidsInPhase].filter(pid=>_koSlipM[pid]).length;
    const hasDrawNoPen=[...pidsInPhase].some(pid=>{
      if(!_koSlipM[pid]) return false;
      const sl=_koSlipM[pid],sv=_misApuestas[pid]||{};
      const gl=sl.pred_local    !==undefined?sl.pred_local    :(sv.pred_local    ??null);
      const gv=sl.pred_visitante!==undefined?sl.pred_visitante:(sv.pred_visitante??null);
      const lT=sl.pred_penales_local_tanda    !==undefined?sl.pred_penales_local_tanda    :(sv.pred_penales_local_tanda    ??null);
      const vT=sl.pred_penales_visitante_tanda!==undefined?sl.pred_penales_visitante_tanda:(sv.pred_penales_visitante_tanda??null);
      return gl!==null&&gl!==''&&gv!==null&&gv!==''&&+gl===+gv&&(lT===null||vT===null);
    });
    if(cntEl) cntEl.textContent=hasDrawNoPen?'⚠':count;

function fillRandomKOFaseM(pids){
  const rv=()=>{const r=Math.random();return r<.2?0:r<.5?1:r<.75?2:r<.9?3:4;};
  for(const pid of pids){
    // Buscar inputs del partido en el DOM
    let found=false;
    const cards=document.querySelectorAll('[id^="bkcm-"]');
    for(const card of cards){
      const inp=card.querySelector('.bk-m-inp');
      if(!inp) continue;
      const onc=inp.getAttribute('oninput')||'';
      const m=onc.match(/onBkScoreM\((\d+)/);
      if(m&&+m[1]===pid){
        const inputs=card.querySelectorAll('.bk-m-inp');
        if(inputs.length>=2){
          let gl=rv(),gv=rv();
          while(gl===gv) gv=rv();
          inputs[0].value=gl; inputs[1].value=gv;
          inputs[0].dispatchEvent(new Event('input'));
          inputs[1].dispatchEvent(new Event('input'));
          // Sin empate → sin tanda requerida
          found=true; break;
        }
      }
    }
    if(!found){
      // Fallback sin DOM
      let gl=rv(),gv=rv();
      while(gl===gv) gv=rv();
      if(!_koSlipM[pid]) _koSlipM[pid]={partido_id:pid};
      _koSlipM[pid].pred_local=gl;
      _koSlipM[pid].pred_visitante=gv;
      // Sin empate → sin tanda requerida
    }
  }
  _syncKOSaveBtnsMFase();
}

/* Navegación por teclado entre inputs numéricos dentro de un contenedor */
function _wireNavM(container, selector){
  const inputs=[...(container||document).querySelectorAll(selector||'input[type="number"]')];
  inputs.forEach((el,idx)=>{
    el.addEventListener('focus',()=>el.select());
    el.addEventListener('keydown',e=>{
      let dir=0;
      if(e.key==='Enter') dir=1;
      else if(e.key==='ArrowRight'&&el.selectionStart>=el.value.length) dir=1;
      else if(e.key==='ArrowLeft'&&el.selectionStart===0) dir=-1;
      else if(e.key==='Tab') dir=e.shiftKey?-1:1;
      if(dir!==0){
        e.preventDefault();
        const t=inputs[idx+dir];
        if(t){t.focus();t.select();}
      }
    });
  });
}

/* #30 Estado de completitud del pronóstico (marcadores + bonus) */
function pronosStats(){
  let tot=0,conM=0,conB=0;
  _grupos.forEach(g=>(g.partidos||[]).forEach(p=>{
    if(p.estado!=='programado'&&p.estado!=='aplazado') return;
    tot++;
    const s=_slip[p.id]||{}, a=_misApuestas[p.id]||{};
    const pl=s.pred_local??a.pred_local, pv=s.pred_visitante??a.pred_visitante;
    if(pl!=null&&pv!=null) conM++;
    const mg=s.pred_minuto_gol??a.pred_minuto_gol, am=s.pred_amarillas??a.pred_amarillas, vr=s.pred_var??a.pred_var;
    if(mg!=null&&am!=null&&vr!=null) conB++;
  }));
  return {tot,conM,conB,faltaM:tot-conM,faltaB:tot-conB};
}

  const lista=[...live,...pend,...finCon];
  const fid=g.fase_id;
  let fixture=lista.map(p=>matchCard(p,fid)).join('') || `<div class="empty" style="padding:20px">Sin partidos en este grupo.</div>`;
  return `<div class="gblock"><div class="gcols">
    <div>${fixture}</div>
    <div>${standingsBox(g,true)}</div>
  </div></div>`;
}

function matchCard(p,fid){
  const ap=_misApuestas[p.id], fin=p.estado==='finalizado'&&p.goles_local!=null&&p.goles_visitante!=null;
  const isLive=p.estado==='en_juego';
  const ln=p.local_nombre_es||p.local_nombre, vn=p.visit_nombre_es||p.visit_nombre;
  const lf=flag(p.local_logo,ln), vf=flag(p.visit_logo,vn);

  // Barra en vivo: score + minuto + tarjetas
  function livebar(){
    if(!isLive) return '';
    const gl=p.goles_local??'?', gv=p.goles_visitante??'?';
    const min=p.minuto_actual!=null?`<span class="mc-live-min">${p.minuto_actual}'</span>`:'';
    const am=p.amarillas!=null?`🟨${p.amarillas}`:'';
    const ro=(p.rojas!=null&&p.rojas>0)?`🟥${p.rojas}`:'';
    const stats=[am,ro].filter(Boolean).join(' ');
    return `<div class="mc-live-bar"><span class="mc-live-dot"></span><span class="mc-live-score">${gl}–${gv}</span>${min}${stats?`<span class="mc-live-stat">${stats}</span>`:''}</div>`;
  }

  // Cuando el período está cerrado, mostrar resultado final (solo lectura)
  if(fin && !_periodo.abierto){
    let cmp='';
    if(ap){
      const pts=ap.puntos??0, cls=pts===3?'pts-3':pts===1?'pts-1':'pts-0', ic=pts===3?'🎯':pts===1?'✔️':'✖️';
      cmp=`<div class="cmp"><span class="lbl">Tu pronóstico:</span><span class="val">${ap.pred_local}–${ap.pred_visitante}</span><span class="ptsb ${cls}">${ic} ${pts} pt${pts!==1?'s':''}${ap.puntos_bonus?` +${ap.puntos_bonus}⚡`:''}</span></div>`;
    } else cmp=`<div class="cmp"><span class="lbl">No pronosticaste este partido</span></div>`;
    return `<div class="mc fin" id="mc-${p.id}"><div class="mc-meta">J${p.jornada||'?'} <span class="fb">Final</span></div>
      <div class="mc-row"><div class="team">${lf}<span class="tname">${esc(ln)}</span></div>
      <div class="sfin">${p.goles_local}<span class="dash">–</span>${p.goles_visitante}${ap?betParen(ap.pred_local,ap.pred_visitante,p.goles_local,p.goles_visitante):''}</div>
      <div class="team r">${vf}<span class="tname">${esc(vn)}</span></div></div>${cmp}</div>`;
  }
  // Período abierto: siempre mostrar inputs editables (aunque el partido sea finalizado o en vivo)
  const realRef=fin?`<span class="gbc-badge" style="background:rgba(34,197,94,.12);color:var(--green);font-weight:700;font-size:.62rem">⚽ ${p.goles_local}–${p.goles_visitante}</span>`:'';
  const cur=_slip[p.id]||(ap?{pred_local:ap.pred_local,pred_visitante:ap.pred_visitante,pred_minuto_gol:ap.pred_minuto_gol,pred_amarillas:ap.pred_amarillas,pred_var:ap.pred_var,pred_rojas:ap.pred_rojas,pred_penales_partido:ap.pred_penales_partido}:{});
  const vL=cur.pred_local??'', vV=cur.pred_visitante??'', dis='';
  const hasPred=vL!==''&&vV!=='', hasB=cur.pred_minuto_gol!=null||cur.pred_amarillas!=null||cur.pred_var!=null||cur.pred_rojas!=null||cur.pred_penales_partido!=null;
  let bonus='';
  bonus=`<button class="btog ${hasB?'on':''}" onclick="toggleBonus(${p.id})">⚡ Bonus${hasB?' · activo':''}</button>
    <div class="bbody ${hasB?'open':''}" id="bb-${p.id}">
      <div class="bfld"><label>Min 1er gol</label><input id="bm-${p.id}" type="number" inputmode="numeric" min="1" max="120" value="${cur.pred_minuto_gol??''}" oninput="onScore(${p.id},${fid})"></div>
      <div class="bfld"><label>Amarillas</label><input id="ba-${p.id}" type="number" inputmode="numeric" min="0" max="20" value="${cur.pred_amarillas??''}" oninput="onScore(${p.id},${fid})"></div>
      <div class="bfld"><label>🟥 Rojas</label><input id="br-${p.id}" type="number" inputmode="numeric" min="0" max="10" value="${cur.pred_rojas??''}" oninput="onScore(${p.id},${fid})"></div>
      <div class="bfld"><label>⚽ Penales partido</label><input id="bpp-${p.id}" type="number" inputmode="numeric" min="0" max="10" value="${cur.pred_penales_partido??''}" oninput="onScore(${p.id},${fid})"></div>
      <div class="bfld"><label>VAR</label><select id="bv-${p.id}" onchange="onScore(${p.id},${fid})">
        <option value="" ${cur.pred_var==null?'selected':''}>—</option>
        <option value="1" ${cur.pred_var===1?'selected':''}>Sí</option>
        <option value="0" ${cur.pred_var===0?'selected':''}>No</option></select></div>
    </div>`;
  const metaLbl = fin
    ? `J${p.jornada||'?'} <span class="fb">Final</span> ${realRef}`
    : isLive
      ? `J${p.jornada||'?'} <span class="fb-live">🔴 En vivo</span>`
      : `J${p.jornada||'?'} · Programado`;
  return `<div class="mc ${hasPred?'has-pred':''}" id="mc-${p.id}"><div class="mc-meta">${metaLbl}</div>
    ${livebar()}
    <div class="mc-row"><div class="team">${lf}<span class="tname">${esc(ln)}</span></div>
    <div class="sin"><input id="sl-${p.id}" type="number" inputmode="numeric" min="0" max="20" value="${vL}" oninput="onScore(${p.id},${fid})">
    <span class="dash">–</span>
    <input id="sv-${p.id}" type="number" inputmode="numeric" min="0" max="20" value="${vV}" oninput="onScore(${p.id},${fid})"></div>
    <div class="team r">${vf}<span class="tname">${esc(vn)}</span></div></div>${bonus}</div>`;
}
function toggleBonus(id){document.getElementById('bb-'+id)?.classList.toggle('open');event.currentTarget.classList.toggle('on');}

function onScore(id,fid){
  const vL=document.getElementById('sl-'+id)?.value, vV=document.getElementById('sv-'+id)?.value;
  const bm=document.getElementById('bm-'+id)?.value, ba=document.getElementById('ba-'+id)?.value;
  const bv=document.getElementById('bv-'+id)?.value, br=document.getElementById('br-'+id)?.value;
  const bpp=document.getElementById('bpp-'+id)?.value;
  const e={};
  if(vL!==''&&vV!==''&&!isNaN(+vL)&&!isNaN(+vV)){e.pred_local=parseInt(vL);e.pred_visitante=parseInt(vV);}
  if(bm!==''&&bm!=null&&!isNaN(+bm)) e.pred_minuto_gol=parseInt(bm);
  if(ba!==''&&ba!=null&&!isNaN(+ba)) e.pred_amarillas=parseInt(ba);
  if(br!==''&&br!=null&&!isNaN(+br)) e.pred_rojas=parseInt(br);
  if(bv!==''&&bv!=null) e.pred_var=parseInt(bv);
  if(bpp!==''&&bpp!=null&&!isNaN(+bpp)) e.pred_penales_partido=parseInt(bpp);
  if(Object.keys(e).length){_slip[id]=e;document.getElementById('mc-'+id)?.classList.add('has-pred');}
  else{delete _slip[id];document.getElementById('mc-'+id)?.classList.remove('has-pred');}
  _bracketDirty=true;
  // refrescar tabla en vivo del grupo activo
  const g=_grupos.find(x=>x.fase_id===fid);
  if(g){const box=document.getElementById('stwrap-'+fid); if(box) box.innerHTML=standingsBox(g,true,true);}
  const warn=document.getElementById('pronosWarn'); if(warn) warn.innerHTML=pronosWarnHtml();
  updateSaveCount();
}

/* ════════ KO Bracket inputs (móvil) ════════ */
function _bkCmpM(pl,pv,rl,rv){
  if(pl==null||pv==null||rl==null||rv==null) return null;
  pl=+pl;pv=+pv;rl=+rl;rv=+rv;
  if(pl===rl&&pv===rv) return 'pleno';
  if((pl>pv&&rl>rv)||(pl<pv&&rl<rv)||(pl===pv&&rl===rv)) return 'acierto';
  return 'fallo';
}
function onBkScoreM(pid,side,val){
  if(!_koSlipM[pid]) _koSlipM[pid]={partido_id:pid};
  _koSlipM[pid][side==='l'?'pred_local':'pred_visitante']=val===''?null:+val;
  _updatePenRequiredM(pid);
  _updKoSaveBtnM();
  _syncKOSaveBtnsMFase();
}
function onBkTandaM(pid,side,val){
  if(!_koSlipM[pid]) _koSlipM[pid]={partido_id:pid};
  const field=side==='l'?'pred_penales_local_tanda':'pred_penales_visitante_tanda';
  _koSlipM[pid][field]=val===''?null:+val;
  _updatePenRequiredM(pid);
  _updKoSaveBtnM();
  _syncKOSaveBtnsMFase();
}
function _updatePenRequiredM(pid){
  const sl=_koSlipM[pid]||{};
  const sv=_misApuestas[pid]||{};
  const gl=sl.pred_local    !==undefined?sl.pred_local    :(sv.pred_local    ??null);
  const gv=sl.pred_visitante!==undefined?sl.pred_visitante:(sv.pred_visitante??null);
  const lT=sl.pred_penales_local_tanda    !==undefined?sl.pred_penales_local_tanda    :(sv.pred_penales_local_tanda    ??null);
  const vT=sl.pred_penales_visitante_tanda!==undefined?sl.pred_penales_visitante_tanda:(sv.pred_penales_visitante_tanda??null);
  const req=gl!==null&&gl!==''&&gv!==null&&gv!==''&&+gl===+gv&&(lT===null||vT===null);
  document.querySelectorAll(`[data-pen-pid="${pid}"]`).forEach(el=>{
    if(el.classList.contains('pen-req-warn')) el.style.display=req?'inline':'none';
    else el.classList.toggle('pen-required',req);
  });
}
function onBkBonusM(pid,field,val){
  if(!_koSlipM[pid]) _koSlipM[pid]={partido_id:pid};
  _koSlipM[pid][field]=val===''?null:+val;
  _syncKOSaveBtnsMFase();
}
function _updKoSaveBtnM(){
  const btn=document.getElementById('bk-savem');
  if(!btn) return;
  const cnt=Object.keys(_koSlipM).length;
  btn.disabled=!cnt;
  btn.textContent=cnt?`💾 Guardar KO (${cnt})`:'💾 Sin cambios';

async function saveKOM(){
  if(!token) return;

  if(btn){btn.disabled=true;btn.textContent='⏳ Guardando…';}

  for(const it of items){

    const sv=_misApuestas[it.partido_id]||{};
    try{

function _renderKOInputsM(koData,realMap){

    const pgl=sl.pred_local!==undefined?sl.pred_local:(sv.pred_local??'');
    const pgv=sl.pred_visitante!==undefined?sl.pred_visitante:(sv.pred_visitante??'');
    const ppen=sl.pred_penales!==undefined?sl.pred_penales:(sv.pred_penales??null);

/* ════════ tabla de posiciones (sim o real) ════════ */
function standingsBox(g,sim,inner){
  const fid=g.fase_id, L=grpLetter(g);
  let rows, usados, total, live=false;
  if(sim){const s=simGroup(g);rows=s.rows;usados=s.usados;total=s.total;live=usados>0;}
  else{rows=(g.standings||[]).map(e=>({...e,gd:e.gd??((e.gf||0)-(e.gc||0))}));}
  let body=`<div class="stbox-h">📊 Grupo ${esc(L)}${sim?`<span class="live">${live?`SIM ${usados}/${total}`:'sin pronós'}</span>`:''}</div>
    <table class="st"><thead><tr><th class="pos">#</th><th></th><th class="l">Equipo</th><th>PJ</th><th>DG</th><th>Pts</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const gd=r.gd??((r.gf||0)-(r.gc||0));
    const cls=i<2?'q1':(i===2?'q3':'');
    body+=`<tr class="${cls}"><td class="pos">${i+1}</td><td>${flag(r.logo_url,r.nombre,'sm')}</td>
      <td class="l"><div class="tc"><span class="nm">${esc(r.nombre)}</span></div></td>
      <td>${r.pj||0}</td><td class="${gd>=0?'gdp':'gdn'}">${gd>=0?'+':''}${gd}</td><td class="pts">${r.pts||0}</td></tr>`;
  });
  body+=`</tbody></table><div class="st-leg"><span><b style="color:var(--green)">●</b> clasifican</span><span><b style="color:var(--indigo)">3º</b> a mejores terceros</span></div>`;
  if(inner) return body;
  return `<div class="stbox" id="stwrap-${fid}">${body}</div>`;
}

async function _renderPronosEnVivoM(el){
  if(!el.dataset.lvLoaded)
    el.innerHTML='<div class="loader"><span class="spin">◌</span> Cargando…</div>';
  try{
    // Admin + partido vivo: sync primero para traer datos frescos de API-Football
    if(_isAdmin && el.dataset.lvHayVivo==='1'){
      try{await api('/api/v1/bets/sync-resultados/'+_torneoId,{method:'POST'});}catch{}
    }
    const data=await api('/api/v1/bets/partidos-en-vivo/'+_torneoId);
    const ps=data.partidos||[];
    el.dataset.lvLoaded='1';
    el.dataset.lvHayVivo=ps.some(p=>p.estado==='en_juego')?'1':'0';
    if(!ps.length){el.innerHTML=empty('🕐','Sin partidos hoy','No hay partidos en juego ni programados para hoy.');return;}
    const hayVivo=ps.some(p=>p.estado==='en_juego');
    const interval=hayVivo&&_isAdmin?60:30;

                 :fin ?`<span class="lvm-badge fin">✓ Fin</span>`

      const logoV=p.visitante_logo?`<img src="${esc(p.visitante_logo)}" onerror="this.style.display='none'">`:' ';
      h+=`<div class="lvm-card${live?' live':''}">

        <div class="lvm-body">

        </div>`;

      // Predicción del apostador
      if(p.pred_local!=null||p.pred_visitante!=null){
        const pl=p.pred_local??'?', pv=p.pred_visitante??'?';
        const exac=!prog&&p.goles_local!=null&&p.pred_local==p.goles_local&&p.pred_visitante==p.goles_visitante;
        const resu=!prog&&p.goles_local!=null&&!exac&&(
          (p.pred_local>p.pred_visitante)===(p.goles_local>p.goles_visitante)||
          (p.pred_local===p.pred_visitante&&p.goles_local===p.goles_visitante));
        const col=prog?'var(--muted)':exac?'#22c55e':resu?'#f59e0b':'#ef4444';
        const lbl=prog?'':exac?' ✓ exacto':resu?' ✓ resultado':' ✗';
        const ptsHtml=p.pts_total>0?`<span style="color:#22c55e;font-weight:800;font-size:.68rem">${p.pts_total}pts</span>`:'';
        h+=`<div style="display:flex;align-items:center;gap:6px;justify-content:center;padding:3px 10px 5px;font-size:.7rem;border-top:1px solid var(--line);">
          <span style="color:var(--muted)">Tu pred:</span>
          <span style="color:${col};font-weight:700">${pl}–${pv}${lbl}</span>${ptsHtml}
        </div>`;
      }

      // Bonus predictions (amarillas, rojas, VAR, minuto)
      const hasAnyBonusM=p.pred_amarillas!=null||p.pred_rojas!=null||p.pred_var!=null||p.pred_minuto_gol!=null;
      if(hasAnyBonusM){
        const bc=[];
        if(p.pred_amarillas!=null||p.amarillas!=null){const ra=p.amarillas,pa=p.pred_amarillas,ok=ra!=null&&pa===ra,d=ra!=null?`${ra}`:`${pa??'?'}`,s=ra!=null&&pa!=null?`(pred:${pa})`:ra==null&&pa!=null?'?':'';bc.push(`<span class="lvm-bchip${ra!=null?(ok?' ok':' miss'):''}" title="Amar: real ${ra??'—'}/pred ${pa??'—'}">🟨${d}${s}</span>`);}
        if(p.pred_rojas!=null||p.rojas!=null){const rr=p.rojas,pr=p.pred_rojas,ok=rr!=null&&pr===rr,d=rr!=null?`${rr}`:`${pr??'?'}`,s=rr!=null&&pr!=null?`(pred:${pr})`:rr==null&&pr!=null?'?':'';bc.push(`<span class="lvm-bchip${rr!=null?(ok?' ok':' miss'):''}" title="Rojas: real ${rr??'—'}/pred ${pr??'—'}">🟥${d}${s}</span>`);}
        if(p.pred_var!=null||p.decisiones_var!=null){const rv=p.decisiones_var,pv2=p.pred_var,ok=rv!=null&&pv2===rv,d=rv!=null?`${rv}`:`${pv2??'?'}`,s=rv!=null&&pv2!=null?`(pred:${pv2})`:rv==null&&pv2!=null?'?':'';bc.push(`<span class="lvm-bchip${rv!=null?(ok?' ok':' miss'):''}" title="VAR: real ${rv??'—'}/pred ${pv2??'—'}"><span class="var-badge">VAR</span>${d}${s}</span>`);}
        if(p.pred_minuto_gol!=null||p.minuto_primer_gol!=null){const rm=p.minuto_primer_gol,pm=p.pred_minuto_gol,ok=rm!=null&&pm!=null&&Math.abs(pm-rm)===0,d=rm!=null?`${rm}'`:`${pm??'?'}'`,s=rm!=null&&pm!=null?`(pred:${pm}')`:rm==null&&pm!=null?'?':'';bc.push(`<span class="lvm-bchip${rm!=null?(ok?' ok':' miss'):''}" title="Min gol: real ${rm??'—'}/pred ${pm??'—'}">⏱${d}${s}</span>`);}
        if(bc.length) h+=`<div class="lvm-bbonus">${bc.join('')}</div>`;
      }

      if(p.penales_local!=null||p.penales_visitante!=null)
        h+=`<div class="lvm-pen">Penales: ${p.penales_local??'?'} – ${p.penales_visitante??'?'}</div>`;

      // Eventos
      const eventos=p.eventos_api||[];
      if(eventos.length){
        h+='<div style="border-top:1px solid var(--line);padding:4px 8px;">';
        for(const ev of eventos){
          const tipo=ev?.type||'', det=ev?.detail||'';
          if(tipo==='subst') continue;
          let icon='';
          if(tipo==='Goal'&&det!=='Missed Penalty'&&det!=='Penalty Missed')
            icon=det==='Own Goal'?'🟢':det==='Penalty'?'⚽🅿️':'⚽';
          else if(tipo==='Card')
            icon=det==='Red Card'?'🟥':det==='Second Yellow card'?'🟨🟥':'🟨';
          else if(tipo==='Var') icon='<span class="var-badge">VAR</span>';
          else continue;
          const min=ev?.time?.elapsed||'';
          const jug=ev?.player?.name||'';
          const eq=ev?.team?.name||'';
          const esLocal=eq===p.local_nombre;
          h+=`<div style="display:flex;align-items:center;gap:4px;padding:2px 0;font-size:.68rem;${!esLocal?'flex-direction:row-reverse;':''}">
            <span style="font-weight:700;color:var(--muted);min-width:20px">${min}'</span>
            <span>${icon}</span>
            <span style="flex:1;${!esLocal?'text-align:right;':''}">${esc(jug)}<span style="color:var(--muted);font-size:.6rem;margin-left:3px">${esc(eq)}</span></span>
          </div>`;
        }
        h+='</div>';
      }

      // Estadísticas comparadas
      const stats=p.estadisticas_api||[];
      if(stats.length===2){
        const KEYS=['Ball Possession','Total Shots','Shots on Goal','Shots off Goal','Blocked Shots','Corner Kicks','Fouls','Yellow Cards','Red Cards','Offsides','Goalkeeper Saves','Total passes','Passes %','expected_goals'];
        const LBLS={'Ball Possession':'Posesión','Total Shots':'Tiros','Shots on Goal':'Al arco','Shots off Goal':'Fuera arco','Blocked Shots':'Bloqueados','Corner Kicks':'Córners','Fouls':'Faltas','Yellow Cards':'Amarillas','Red Cards':'Rojas','Offsides':'Offside','Goalkeeper Saves':'Atajadas','Total passes':'Pases','Passes %':'% pases','expected_goals':'xG'};
        const hTeam=stats[0]?.team?.name||'';
        const isHF=hTeam===p.local_nombre||hTeam.includes((p.local_nombre||'').split(' ')[0]);
        const [sh,sa]=isHF?[stats[0],stats[1]]:[stats[1],stats[0]];
        const mh=Object.fromEntries((sh.statistics||[]).map(s=>[s.type,s.value]));
        const ma=Object.fromEntries((sa.statistics||[]).map(s=>[s.type,s.value]));
        h+='<div style="border-top:1px solid var(--line);padding:4px 8px;">';
        for(const k of KEYS){
          const vh=mh[k]??'–', va=ma[k]??'–';
          if(vh==='–'&&va==='–') continue;
          h+=`<div style="display:grid;grid-template-columns:1fr auto 1fr;font-size:.65rem;padding:2px 0;border-bottom:1px solid var(--line);">
            <span style="font-weight:700">${vh}</span>
            <span style="text-align:center;color:var(--muted);font-size:.6rem;padding:0 6px">${LBLS[k]||k}</span>
            <span style="text-align:right;font-weight:700">${va}</span>
          </div>`;
        }
        // VAR y minuto gol vienen de eventos, agregar aparte de la grilla
        const extC=[];
        if(p.decisiones_var>0) extC.push(`<span><span class="var-badge">VAR</span> VAR ×${p.decisiones_var}</span>`);
        if(p.minuto_primer_gol!=null) extC.push(`<span>⚽ 1er gol min ${p.minuto_primer_gol}'</span>`);
        if(extC.length) h+=`<div class="lvm-stats">${extC.join('')}</div>`;
        h+='</div>';
      } else {
        const chips=[];
        if(p.amarillas!=null) chips.push(`<span>🟨 ${p.amarillas}</span>`);
        if(p.rojas>0) chips.push(`<span>🟥 ${p.rojas}</span>`);
        if(p.decisiones_var>0) chips.push(`<span><span class="var-badge">VAR</span> VAR ×${p.decisiones_var}</span>`);
        if(p.minuto_primer_gol!=null) chips.push(`<span>⚽ 1er gol min ${p.minuto_primer_gol}'</span>`);
        if(chips.length) h+=`<div class="lvm-stats">${chips.join('')}</div>`;
      }
      h+='</div>';
    }
    h+='</div>';
    el.innerHTML=h;
    // Schedule auto-refresh (60s si admin+vivo para respetar cuota API, 30s si solo lectura BD)
    if(_pronosTab==='envivo'){
      const ms=(hayVivo&&_isAdmin)?60000:30000;
      setTimeout(()=>{if(_pronosTab==='envivo')_renderPronosEnVivoM(el);},ms);
    }
  }catch(e){el.innerHTML=empty('❌','Error',esc(e.message));}
}

const _RB_RONDAS_M=[
  ['🏆 Ronda de 32',     [74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87]],
  ['🎖️ Octavos',         [89,90,93,94,91,92,95,96]],
  ['🥇 Cuartos',          [97,98,99,100]],
  ['⚔️ Semifinales',      [101,102]],
  ['🥉 Tercer puesto',    [103]],

];
function _realBracketM(){
  const map={}; (_bracketReal||[]).forEach(m=>map[m.num]=m);
  let h='<div class="br-sec"><div class="br-sec-h">🏟️ Resultados de playoffs</div>';
  h+='<div class="rk-leg" style="margin:0 2px 9px">Resultados reales. ✅ = equipo ganador que avanza.</div>';
  _RB_RONDAS_M.forEach(([titulo,nums])=>{

    if(!cards.some(m=>m.local||m.visitante)) return;

    nums.forEach(n=>{h+=_rbCardM(map[n],n);});
    h+='</div>';
  });
  h+='</div>';
  return h;
}
function _rbCardM(m,num){
  if(!m) return `<div class="r32m"><div class="num">Partido ${num}</div><div class="r32t tbd"><span class="nm">Por definir</span></div></div>`;
  const fin=m.finalizado;
  const row=(side)=>{
    const t=side==='local'?m.local:m.visitante;
    if(!t) return `<div class="r32t tbd"><span class="nm">Por definir</span></div>`;
    const isW=fin&&m.ganador===side, isL=fin&&m.ganador&&m.ganador!==side;
    const g=side==='local'?m.gl:m.gv;
    const pen=(fin&&m.pen_l!=null&&m.pen_v!=null)?` (${side==='local'?m.pen_l:m.pen_v})`:'';
    const sc=(fin&&g!=null)?`<span style="font-weight:800;margin-left:auto">${g}${pen}</span>`:'';
    const st=isW?'background:rgba(34,197,94,.14);border-left:3px solid #22c55e':(isL?'opacity:.45':'');
    const tick=isW?'<span style="color:#22c55e;font-weight:800;margin-right:3px">✅</span>':'';
    return `<div class="r32t" style="${st}">${tick}${flag(t.logo_url,t.nombre,'sm')}<span class="nm" style="${isW?'font-weight:800':''}">${esc(t.nombre)}</span>${sc}</div>`;
  };
  return `<div class="r32m"><div class="num">Partido ${num}</div>${row('local')}<div class="vs">vs</div>${row('visitante')}</div>`;
}
function tercRow(t,pos,inOK){
  const gd=t.gd??((t.gf||0)-(t.gc||0));
  return `<tr class="${inOK?'in':'out'}"><td class="qmark">${inOK?'✓':'✗'}</td><td>${flag(t.logo_url,t.nombre_es||t.nombre,'sm')}</td>
    <td class="l"><span class="nm" style="font-weight:700">${esc(t.nombre_es||t.nombre)}</span></td>
    <td>${esc(t.grupo)}</td><td style="font-weight:800">${t.pts||0}</td><td class="${gd>=0?'gdp':'gdn'}">${gd>=0?'+':''}${gd}</td></tr>`;
}
function r32Card(m){
  const row=(side,slot)=>{
    if(!side) return `<div class="r32t tbd"><span class="slot">${slot||'?'}</span><span class="nm">Por definir</span></div>`;
    return `<div class="r32t"><span class="slot">${esc(side.slot||slot||'')}</span>${flag(side.logo_url,side.nombre_es||side.nombre,'sm')}<span class="nm">${esc(side.nombre_es||side.nombre)}</span></div>`;
  };
  return `<div class="r32m"><div class="num">Partido ${m.num}</div>${row(m.local)}<div class="vs">vs</div>${row(m.visitante)}</div>`;
}
