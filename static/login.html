<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BECBUC 2026 — Ingresar</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f1117; color: #e8eaf0;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.card {
  background: #1a1d27; border: 1px solid #2a2d3a;
  border-radius: 14px; padding: 40px 32px;
  width: 100%; max-width: 340px;
}
h1 { font-size: 1.8rem; font-weight: 900; color: #e05020; text-align: center; margin-bottom: 4px; }
.sub { font-size: .72rem; color: #8892a4; text-align: center; margin-bottom: 28px; text-transform: uppercase; letter-spacing: .06em; }
label { display: block; font-size: .72rem; color: #8892a4; margin-bottom: 5px; margin-top: 16px; text-transform: uppercase; letter-spacing: .06em; }
input {
  width: 100%; background: rgba(255,255,255,.05); border: 1px solid #2a2d3a;
  border-radius: 8px; color: #e8eaf0; font-size: .9rem; padding: 10px 13px; outline: none;
}
input:focus { border-color: #e05020; }
button {
  display: block; width: 100%; margin-top: 24px; padding: 11px;
  background: #e05020; color: #fff; border: none; border-radius: 9px;
  font-size: .9rem; font-weight: 700; cursor: pointer;
  transition: background .15s;
}
button:disabled { opacity: .5; cursor: not-allowed; }
button:not(:disabled):hover { background: #c04010; }
.err { margin-top: 14px; color: #ef4444; font-size: .78rem; text-align: center; min-height: 18px; line-height: 1.4; }
.info { margin-top: 10px; color: #8892a4; font-size: .73rem; text-align: center; min-height: 16px; }
.step { color: #94a3b8; font-size: .73rem; text-align: center; margin-top: 8px; }
.dot-anim::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
@keyframes dots { 0%,100%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
</style>
</head>
<body>
<div class="card">
  <h1>BEC BUC</h1>
  <div class="sub">Copa del Mundo 2026</div>

  <a href="/static/becbuc-live.html" style="display:block;margin-bottom:18px;padding:11px 14px;background:rgba(0,166,81,.08);border:1px solid rgba(0,166,81,.3);border-radius:9px;text-decoration:none;text-align:center;">
    <div style="font-size:.95rem;font-weight:800;color:#00a651;">🔴 BECBUC Live</div>
    <div style="font-size:.68rem;color:#8892a4;margin-top:2px;">Accedé al partido en vivo sin loguearte</div>
  </a>

  <label>Usuario</label>
  <input id="u" type="text" autocomplete="username" placeholder="tu usuario"
         onkeydown="if(event.key==='Enter')document.getElementById('p').focus()">

  <label>Contraseña</label>
  <input id="p" type="password" autocomplete="current-password" placeholder="••••••"
         onkeydown="if(event.key==='Enter')login()">

  <button id="btn" onclick="login()">Ingresar</button>
  <div class="err" id="err"></div>
  <div class="step" id="step"></div>
</div>

<script>
const TIMEOUT_MS = 12000; // 12 segundos máximo para respuesta del servidor

async function login() {
  const u   = document.getElementById('u').value.trim();
  const p   = document.getElementById('p').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('btn');
  const step = document.getElementById('step');

  err.textContent = '';
  step.textContent = '';
  if (!u || !p) { err.textContent = 'Completá usuario y contraseña.'; return; }

  btn.disabled = true;
  btn.textContent = 'Ingresando…';

  // ── Paso 1: conectar con el servidor ─────────────────────────────
  step.innerHTML = '<span class="dot-anim">Conectando con el servidor</span>';

  const controller = new AbortController();
  const timeoutId = setTimeout(() => {
    controller.abort();
  }, TIMEOUT_MS);

  let r, data;

  try {
    r = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': 'true',
      },
      body: JSON.stringify({ username: u, password: p }),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);
  } catch (e) {
    clearTimeout(timeoutId);
    btn.disabled = false;
    btn.textContent = 'Ingresar';
    step.textContent = '';
    if (e.name === 'AbortError') {
      err.textContent = '⏱ El servidor tardó demasiado en responder (más de ' + (TIMEOUT_MS/1000) + 's). Verificá que el servidor esté corriendo en el puerto 8000.';
    } else {
      err.textContent = '🔌 No se pudo conectar con el servidor. Verificá que uvicorn esté activo (puerto 8000).';
    }
    console.error('[login] fetch error:', e.name, e.message);
    return;
  }

  // ── Paso 2: leer respuesta ────────────────────────────────────────
  step.innerHTML = '<span class="dot-anim">Verificando credenciales</span>';

  try {
    data = await r.json();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Ingresar';
    step.textContent = '';
    err.textContent = `⚠ El servidor respondió (HTTP ${r.status}) pero la respuesta no es válida. Intentá de nuevo.`;
    console.error('[login] r.json() error:', e.message, 'status:', r.status);
    return;
  }

  // ── Paso 3: verificar resultado ────────────────────────────────────
  if (!r.ok) {
    btn.disabled = false;
    btn.textContent = 'Ingresar';
    step.textContent = '';
    const msg = data.detail || 'Credenciales incorrectas.';
    err.textContent = (r.status === 401) ? '🔑 ' + msg : `❌ Error ${r.status}: ${msg}`;
    console.error('[login] auth failed:', r.status, data);
    return;
  }

  if (!data.access_token) {
    btn.disabled = false;
    btn.textContent = 'Ingresar';
    step.textContent = '';
    err.textContent = '⚠ El servidor no devolvió un token. Contactá al admin.';
    console.error('[login] no access_token in response:', data);
    return;
  }

  // ── Paso 4: guardar y redirigir ────────────────────────────────────
  step.innerHTML = '<span class="dot-anim">Cargando tu cuenta</span>';

  try {
    sessionStorage.setItem('bec_token', data.access_token);
    localStorage.setItem('tok_fix', data.access_token);
    if (data.refresh_token) localStorage.setItem('becbuc_refresh', data.refresh_token);
  } catch (e) {
    console.warn('[login] storage error (ignorado):', e.message);
  }

  // Detectar dispositivo
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                   || window.innerWidth < 768;
  const dest = isMobile ? '/static/BECBUC-movil.html' : '/static/BECBUC-portal.html';
  const url  = dest + '?token=' + encodeURIComponent(data.access_token);

  console.info('[login] OK → redirigiendo a', dest);
  window.location.href = url;
}

// Foco automático en el campo usuario
document.getElementById('u').focus();
</script>
</body>
</html>
