// ── Formatear celda ───────────────────────────────────────────────────────────
function formatCell(val, d) {
  if (val === null || val === undefined || val === '') return '<span class="null-val">—</span>';
  const tipo = (d?.tipo_dato || '').toLowerCase();
  const mv   = d?.multivalor;
  if (mv && mvCache[d.campo]) {
    const label = mvCache[d.campo].find(o => String(o.val) === String(val))?.label;
    return label
      ? `<span class="badge-mv" title="${esc(val)}">${esc(label)}</span>`
      : `<span class="badge-mv">${esc(val)}</span>`;
  }
  if (mv) return `<span class="badge-mv">${esc(val)}</span>`;
  if (tipo==='boolean'||tipo==='bool') {
    return val===true||val==='true'||val==='t'
      ? '<span class="bool-t">✓ sí</span>'
      : '<span class="bool-f">✗ no</span>';
  }
  if (tipo.includes('timestamp')||tipo==='timestamptz'||tipo==='datetime') {
    const dt = new Date(String(val).replace(' ','T'));
    const fmt = isNaN(dt) ? String(val).slice(0,16).replace('T',' ')
      : `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()} `
        + `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    return `<span class="date-val">${esc(fmt)}</span>`;
  }
  if (tipo==='date') {
    const d2 = new Date(String(val)+'T00:00:00');
    const fmt = isNaN(d2) ? String(val).slice(0,10)
      : `${String(d2.getDate()).padStart(2,'0')}/${String(d2.getMonth()+1).padStart(2,'0')}/${d2.getFullYear()}`;
    return `<span class="date-val">${esc(fmt)}</span>`;
  }
  if (tipo==='numeric'||tipo==='decimal'||tipo==='float'||tipo==='real') {
    const decs = d?.decimales ?? 2;
    return `<span class="num-val">${parseFloat(val).toLocaleString('es-AR',{minimumFractionDigits:decs,maximumFractionDigits:decs})}</span>`;
  }
  if (tipo.includes('int')||tipo==='bigint'||tipo==='smallint') {
    return `<span class="int-val">${parseInt(val).toLocaleString('es-AR')}</span>`;
  }
  const s = String(val);
  return esc(s.length > 80 ? s.slice(0,80) + '…' : s);
}

// ── MV options ────────────────────────────────────────────────────────────────
async function fetchMvOptions(campo, mv) {
  if (mvCache[campo]) return mvCache[campo];
  mv = mv.trim();
  let opts = [];
  if (mv.toLowerCase().startsWith('select')) {
    const res = await api('/api/v1/admin/sql-db', {
      method: 'POST', body: JSON.stringify({ query: mv, limit: 500, db_slug: dbSlug })
    });
    if (res.ok) {
      const data = await res.json();
      opts = (data.rows || []).map(row => {
        const vals = Object.values(row);
        return { val: String(vals[0]??''), label: vals.length>1 ? String(vals[1]??vals[0]) : String(vals[0]) };
      });
    }
  } else {
    mv.replace(/\r?\n/g,';').split(';').forEach(item => {
      item = item.trim(); if (!item) return;
      const p = item.indexOf('|');
      if (p > 0) opts.push({ val: item.slice(0,p).trim(), label: item.slice(p+1).trim() });
      else if (p < 0) opts.push({ val: item, label: item });
    });
  }
  mvCache[campo] = opts;
  return opts;
}

// ── Exportar CSV ──────────────────────────────────────────────────────────────
function exportCsv() {
  const visCols = getVisCols();
  const rows = applyColFilters(applyFilter(rawRows));
  const hdr = visCols.map(c => `"${(dicMap[c]?.alias || c).replace(/"/g,'""')}"`).join(',');
  const body = rows.map(row =>
    visCols.map(c => {
      const v = row[c];
      if (v === null || v === undefined) return '';
      const opts = mvCache[c];
      if (opts) { const o = opts.find(x => String(x.val) === String(v)); if (o) return `"${o.label.replace(/"/g,'""')}"`; }
      return `"${String(v).replace(/"/g,'""')}"`;
    }).join(',')
  ).join('\n');
  const blob = new Blob(['﻿' + hdr + '\n' + body], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `${tablaAlias}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ── Paginación ────────────────────────────────────────────────────────────────
function updatePagination() {
  const pages   = Math.ceil(totalCount / limit) || 1;
  const curPage = Math.floor(skip / limit) + 1;
  document.getElementById('prevBtn').disabled = skip <= 0;
  document.getElementById('nextBtn').disabled = skip + limit >= totalCount;
  updateFooterInfo(null, null, curPage, pages);
}

function updateFooterInfo(visCount, visCols, curPage, pages) {
  const el = document.getElementById('footerInfo');
  if (curPage !== undefined) {
    const from = skip + 1, to = Math.min(skip + rawRows.length, totalCount);
    el.innerHTML = `<b>${totalCount}</b> registros · mostrando <b>${from}–${to}</b> · página <b>${curPage}</b>/${pages}`
      + (isView ? ' · <span style="color:var(--muted)">👁 vista — solo lectura</span>' : '');
    return;
  }
  if (visCount !== null) {
    const hasFilter = searchQ || Object.values(colFilters).some(v=>v);
    el.innerHTML = hasFilter
      ? `<b>${visCount}</b> resultado${visCount!==1?'s':''} filtrados`
      : `<b>${visCount}</b> registro${visCount!==1?'s':''} en esta página`
      + (isView ? ' · <span style="color:var(--muted)">👁 vista — solo lectura</span>' : '');
  }
}

function prevPage() { if (skip>0) { skip=Math.max(0,skip-limit); loadData(); } }
function nextPage() { if (skip+limit<totalCount) { skip+=limit; loadData(); } }
function changeLimit(n) { limit=n; skip=0; loadData(); }

// ── Búsqueda ──────────────────────────────────────────────────────────────────
function onSearch(val) {
  searchQ = val.trim();
  skip = 0;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(loadData, 350);
}

// ── Ficha modal (dblclick) ────────────────────────────────────────────────────
let _fichaPk      = null;
let _fichaChanges = {};

function openFichaModal(pk) {
  const row = rawRows.find(r => String(r[pkCol]) === String(pk));
  if (!row) return;
  _fichaPk      = pk;
  _fichaChanges = {};

  const visCols = getVisCols();
  const body    = document.getElementById('fichaBody');
  const ftr     = document.getElementById('fichaFooter');
  document.getElementById('fichaTitleEl').textContent = `${tablaName} — #${pk}`;
  body.innerHTML = '';
  ftr.innerHTML  = '';

  visCols.forEach(c => {
    const d    = dicMap[c] || {};
    const tipo = (d.tipo_dato || '').toLowerCase();
    const mv   = d.multivalor?.trim() || null;
    const opts = mv ? (mvCache[c] || []) : null;
    const val  = row[c];
    const label = d.alias || c;
    const isTextLong = tipo === 'text';
    const isReadonly = c === pkCol || d.es_solo_lectura || isView || !canWrite;

    const wrapper = document.createElement('div');
    wrapper.className = 'ficha-field' + (isTextLong ? ' ficha-full' : '');

    const lbl = document.createElement('label');
    lbl.className = 'ficha-label';
    lbl.textContent = label;
    wrapper.appendChild(lbl);

    let input;

    if (opts && opts.length > 0 && !isReadonly) {
      input = document.createElement('select');
      input.className = 'ficha-select';
      const emptyOpt = document.createElement('option'); emptyOpt.value=''; emptyOpt.textContent='— seleccionar —';
      input.appendChild(emptyOpt);
      opts.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.val; opt.textContent = o.label;
        if (String(o.val) === String(val ?? '')) opt.selected = true;
        input.appendChild(opt);
      });
    } else if (tipo === 'boolean' || tipo === 'bool') {
      input = document.createElement('select');
      input.className = 'ficha-select';
      if (isReadonly) input.disabled = true;
      [['true','✓ Sí'],['false','✗ No']].forEach(([v,l]) => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = l;
        const boolVal = val === true || val === 'true' || val === 't';
        if ((v === 'true') === boolVal) opt.selected = true;
        input.appendChild(opt);
      });
    } else if (isTextLong) {
      input = document.createElement('textarea');
      input.className = 'ficha-textarea';
      input.value = val ?? '';
      if (isReadonly) input.readOnly = true;
    } else if (tipo.includes('timestamp') || tipo === 'timestamptz' || tipo === 'datetime') {
      input = document.createElement('input');
      input.type = 'datetime-local'; input.className = 'ficha-input';
      input.value = val ? String(val).replace(' ','T').slice(0,16) : '';
      if (isReadonly) input.readOnly = true;
    } else if (tipo === 'date') {
      input = document.createElement('input');
      input.type = 'date'; input.className = 'ficha-input';
      input.value = val ? String(val).slice(0,10) : '';
      if (isReadonly) input.readOnly = true;
    } else if (tipo.includes('int') || tipo === 'bigint' || tipo === 'smallint' || tipo === 'serial') {
      input = document.createElement('input');
      input.type = 'number'; input.step = '1'; input.className = 'ficha-input';
      input.value = val ?? '';
      if (isReadonly) input.readOnly = true;
    } else if (tipo === 'numeric' || tipo === 'decimal' || tipo === 'float' || tipo === 'real') {
      const decs = d.decimales ?? 2;
      input = document.createElement('input');
      input.type = 'number'; input.step = (1/Math.pow(10,decs)).toFixed(decs); input.className = 'ficha-input';
      input.value = val ?? '';
      if (isReadonly) input.readOnly = true;
    } else {
      input = document.createElement('input');
      input.type = 'text'; input.className = 'ficha-input';
      input.value = val ?? '';
      if (isReadonly) input.readOnly = true;
    }

    input.dataset.campo = c;
    const origVal = val;
    input.addEventListener('change', () => {
      const nv = input.value;
      if (String(nv) !== String(origVal ?? '')) {
        _fichaChanges[c] = nv === '' ? null : nv;
      } else {
        delete _fichaChanges[c];
      }
    });
    wrapper.appendChild(input);
    body.appendChild(wrapper);
  });

  // Footer buttons
  const btnClose = document.createElement('button');
  btnClose.className = 'icn-btn btn-secondary';
  btnClose.innerHTML = IC.x + ' Cerrar';
  btnClose.onclick = closeFichaModal;
  ftr.appendChild(btnClose);

  if (!isView && canWrite) {
    const btnSave = document.createElement('button');
    btnSave.className = 'icn-btn btn-primary';
    btnSave.id = 'fichaSaveBtn';
    btnSave.innerHTML = IC.check + ' Guardar';
    btnSave.onclick = saveFichaModal;
    ftr.appendChild(btnSave);
  } else if (!canWrite) {
    // Mostrar indicador de solo lectura
    const ro = document.createElement('span');
    ro.style.cssText = 'font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:5px;';
    ro.innerHTML = '<i class="ti ti-eye"></i> Solo lectura';
    ftr.prepend(ro);
  }

  document.getElementById('fichaOverlay').classList.add('open');
}

function closeFichaModal() {
  document.getElementById('fichaOverlay').classList.remove('open');
  _fichaPk = null; _fichaChanges = {};
}

async function saveFichaModal() {
  if (!_fichaPk || !Object.keys(_fichaChanges).length) { closeFichaModal(); return; }
  const btn = document.getElementById('fichaSaveBtn');
  if (btn) btn.disabled = true;
  const sp = dbSlug ? `?db_slug=${encodeURIComponent(dbSlug)}` : '';
  const res = await api(
    `/api/v1/admin/tables/${encodeURIComponent(tablaName)}/rows/${encodeURIComponent(_fichaPk)}${sp}`,
    { method: 'PATCH', body: JSON.stringify(_fichaChanges) }
  );
  if (res.ok) {
    const updated = await res.json().catch(() => ({}));
    const idx = rawRows.findIndex(r => String(r[pkCol]) === String(_fichaPk));
    if (idx >= 0) rawRows[idx] = { ...rawRows[idx], ..._fichaChanges, ...updated };
    // Sync dirty state if row was also dirty inline
    if (dirtyRows[_fichaPk]) {
      Object.keys(_fichaChanges).forEach(k => { if (dirtyRows[_fichaPk]) delete dirtyRows[_fichaPk][k]; });
      if (!Object.keys(dirtyRows[_fichaPk] || {}).length) delete dirtyRows[_fichaPk];
    }
    updateDirtyBar();
    closeFichaModal();
    renderTable();
  } else {
    const err = await res.json().catch(() => ({}));
    alert('Error al guardar: ' + (err.detail || 'Error desconocido'));
    if (btn) btn.disabled = false;
  }
}

// ── Exportar Excel (XLSX) ─────────────────────────────────────────────────────
function exportXlsx() {
  if (typeof XLSX === 'undefined') { alert('La librería XLSX no está disponible.'); return; }
  const visCols = getVisCols();
  const rows    = applyColFilters(applyFilter(rawRows));

  const wsData = [];
  // Header row
  wsData.push(visCols.map(c => dicMap[c]?.alias || c));
  // Data rows
  rows.forEach(row => {
    wsData.push(visCols.map(c => {
      const v = row[c];
      if (v === null || v === undefined) return '';
      const opts = mvCache[c];
      if (opts) { const o = opts.find(x => String(x.val) === String(v)); if (o) return o.label; }
      return v;
    }));
  });

  const ws = XLSX.utils.aoa_to_sheet(wsData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, tablaAlias.slice(0, 31));
  XLSX.writeFile(wb, `${tablaAlias}.xlsx`);
}

init();
</script>
